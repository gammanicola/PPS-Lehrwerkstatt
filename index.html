<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Produktions-Dashboard – PPS Lehrwerkstatt</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/recharts@2.8.0/umd/Recharts.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0f1e;color:#f1f5f9;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:#1e293b}
::-webkit-scrollbar-thumb{background:#334155;border-radius:3px}
input[type=number]::-webkit-inner-spin-button{opacity:1}
#root{min-height:100vh}
</style>
</head>
<body>
<div id="root"><div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#6366f1;font-size:18px">⏳ Lädt...</div></div>
<script>
// Wait for libraries
window.addEventListener('load', function() {
  setTimeout(initApp, 100);
});

function initApp() {
const {createElement:h, useState, useMemo, useCallback, Fragment} = React;
const {ComposedChart, Bar, Line, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, Legend} = Recharts;

// ── Helpers ──
const pad = n => String(n).padStart(2,"0");
const fmtDate = d => { if(!d) return ""; const x=d instanceof Date?d:new Date(d); return `${x.getFullYear()}-${pad(x.getMonth()+1)}-${pad(x.getDate())}`; };
const parseD = s => { const d=new Date(s); d.setHours(0,0,0,0); return d; };
const addD = (d,n) => { const x=new Date(d); x.setDate(x.getDate()+n); return x; };
const diffD = (a,b) => Math.round((parseD(b)-parseD(a))/86400000);
const isWork = d => d.getDay()!==0&&d.getDay()!==6;
const nextWork = d => { let x=new Date(d); while(!isWork(x)) x=addD(x,1); return x; };
const getKW = d => { const t=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate())); t.setUTCDate(t.getUTCDate()+4-(t.getUTCDay()||7)); const y=new Date(Date.UTC(t.getUTCFullYear(),0,1)); return {kw:Math.ceil((((t-y)/86400000)+1)/7),year:t.getUTCFullYear()}; };
const kwKey = (yr,kw) => `${yr}-W${pad(kw)}`;
const mondayOfKW = (yr,kw) => { const j=new Date(yr,0,4),m=new Date(j); m.setDate(j.getDate()-((j.getDay()||7)-1)+(kw-1)*7); m.setHours(0,0,0,0); return m; };
const allKWsOfYear = yr => { const res=[]; for(let kw=1;kw<=53;kw++){ const mon=mondayOfKW(yr,kw); if(mon.getFullYear()>yr&&kw>1) break; if(mon.getFullYear()<yr) continue; res.push({kw,year:yr,key:kwKey(yr,kw),label:`KW${pad(kw)}`,monday:mon}); } return res; };
const today = new Date(); today.setHours(0,0,0,0);
const CY = today.getFullYear();
const todayKW = getKW(today);

function calcZeitgrad(maId, auftraege) {
  const rel=auftraege.filter(a=>a.maId===maId&&a.status==="fertig"&&a.vorgabe>0);
  const sumSoll=rel.reduce((s,a)=>s+a.vorgabe,0);
  const sumIst=rel.reduce((s,a)=>s+(a.istZeit||0),0);
  if(sumSoll===0||rel.length===0) return null;
  return +(sumIst/sumSoll*100).toFixed(1);
}
function findNextCapDay(from,ma) {
  let cur=new Date(from); while(!isWork(cur)) cur=addD(cur,1);
  let safety=0;
  while(safety<500){ if(isWork(cur)){ const {kw,year:y}=getKW(cur); const k=kwKey(y,kw); const kapW=ma.kap?.[k]??0; if(kapW>0) return cur; const mon=mondayOfKW(y,kw); cur=addD(mon,7); } else { cur=addD(cur,1); } safety++; }
  return cur;
}
function autoSchedule(auftraege, maList) {
  const result = auftraege.map(a => ({...a}));
  maList.forEach(ma => {
    const zg = ma.zeitgrad ?? 100;
    const active = result.filter(a => a.maId === ma.id && a.status !== "fertig");
    active.sort((a,b) => { const da=a.deadline||"9999-12-31",db=b.deadline||"9999-12-31"; return da<db?-1:da>db?1:a.id-b.id; });
    let curDay = findNextCapDay(nextWork(today), ma);
    let {kw:ckw, year:cyr} = getKW(curDay);
    let remainingToday = (ma.kap?.[kwKey(cyr,ckw)] ?? 0) / 5;
    active.forEach(a => {
      const gh = zg > 0 ? +(a.vorgabe / (zg/100)).toFixed(4) : a.vorgabe;
      let remaining = gh, cur = new Date(curDay), curRemToday = remainingToday;
      a.start = fmtDate(cur); let lastDay = new Date(cur);
      while (remaining > 0.0001) {
        const {kw,year:y} = getKW(cur); const k = kwKey(y,kw); const kapW = ma.kap?.[k] ?? 0;
        if (kapW === 0) { cur = findNextCapDay(addD(cur,1), ma); const {kw:nkw,year:ny} = getKW(cur); curRemToday = (ma.kap?.[kwKey(ny,nkw)] ?? 0) / 5; a.start = a.start || fmtDate(cur); continue; }
        if (curRemToday <= 0) { cur = addD(cur,1); while (!isWork(cur)) cur = addD(cur,1); const {kw:nkw,year:ny} = getKW(cur); const nk = kwKey(ny,nkw); if ((ma.kap?.[nk]??0) === 0) { cur = findNextCapDay(cur, ma); } const {kw:fkw,year:fy} = getKW(cur); curRemToday = (ma.kap?.[kwKey(fy,fkw)] ?? 0) / 5; continue; }
        const consume = Math.min(remaining, curRemToday); remaining -= consume; curRemToday -= consume; lastDay = new Date(cur);
        if (remaining <= 0.0001) break;
        if (curRemToday <= 0.0001) { cur = addD(cur,1); while (!isWork(cur)) cur = addD(cur,1); const {kw:nkw,year:ny} = getKW(cur); const nk = kwKey(ny,nkw); if ((ma.kap?.[nk]??0) === 0) cur = findNextCapDay(cur,ma); const {kw:fkw,year:fy} = getKW(cur); curRemToday = (ma.kap?.[kwKey(fy,fkw)]??0) / 5; }
      }
      a.end = fmtDate(lastDay); curDay = new Date(lastDay); remainingToday = curRemToday <= 0.0001 ? 0 : curRemToday;
      const idx = result.findIndex(r => r.id === a.id); if (idx >= 0) result[idx] = a;
    });
  });
  return result;
}

const initMA=[
  {id:1,name:"Thomas Müller",rolle:"Schlosser",zeitgrad:85,kap:{}},
  {id:2,name:"Anna Schmidt",rolle:"Lackiererin",zeitgrad:92,kap:{}},
  {id:3,name:"Klaus Weber",rolle:"Monteur",zeitgrad:75,kap:{}},
  {id:4,name:"Sara Braun",rolle:"CNC-Fräser",zeitgrad:100,kap:{}},
];
const initRaw=[
  {id:1,nr:"AU-1001",bez:"Stahlrahmen Charge A",maId:1,vorgabe:8,istZeit:0,status:"offen",deadline:fmtDate(addD(today,10))},
  {id:2,nr:"AU-1002",bez:"Schweißnaht Rahmen C",maId:1,vorgabe:10,istZeit:0,status:"offen",deadline:fmtDate(addD(today,20))},
  {id:3,nr:"AU-1003",bez:"Lackierung Türen",maId:2,vorgabe:5,istZeit:4,status:"läuft",deadline:fmtDate(addD(today,5))},
  {id:4,nr:"AU-1004",bez:"Montage Gestell B",maId:3,vorgabe:12,istZeit:13,status:"fertig",deadline:fmtDate(addD(today,-2)),start:fmtDate(addD(today,-10)),end:fmtDate(addD(today,-2))},
  {id:5,nr:"AU-1005",bez:"CNC Fräsung #7",maId:4,vorgabe:6,istZeit:0,status:"offen",deadline:fmtDate(addD(today,8))},
  {id:6,nr:"AU-1006",bez:"Wartung Maschine B",maId:1,vorgabe:4,istZeit:0,status:"offen",deadline:fmtDate(addD(today,6))},
];
const initMAWithZG=initMA.map(m=>{const zg=calcZeitgrad(m.id,initRaw);return {...m,zeitgrad:zg??m.zeitgrad};});
const initAuf=autoSchedule(initRaw,initMAWithZG);
const S_COL={offen:"#f59e0b","läuft":"#6366f1",fertig:"#22c55e"};
const STATUS_OPTS=["alle","offen","läuft","fertig"];

// ── UI Components ──
function Btn({children,onClick,color,sm,outline,style={}}) {
  const c = color||"#6366f1";
  return h('button',{onClick,style:{padding:sm?"5px 10px":"8px 16px",background:outline?"transparent":c,border:`1px solid ${c}`,borderRadius:7,color:outline?c:"#fff",cursor:"pointer",fontSize:sm?12:13,fontWeight:600,...style}},children);
}
function Inp({label,type,value,onChange,options,placeholder}) {
  const s={width:"100%",background:"#0f172a",border:"1px solid #334155",borderRadius:6,padding:"7px 10px",color:"#f1f5f9",fontSize:13,boxSizing:"border-box"};
  return h('div',{style:{marginBottom:10}},
    label&&h('div',{style:{fontSize:12,color:"#94a3b8",marginBottom:4}},label),
    options
      ? h('select',{value,onChange:e=>onChange(e.target.value),style:s},options.map(o=>h('option',{key:o.v??o,value:o.v??o},o.l??o)))
      : h('input',{type:type||"text",value,onChange:e=>onChange(e.target.value),placeholder,style:s})
  );
}
function Modal({title,onClose,children,wide}) {
  return h('div',{style:{position:"fixed",inset:0,background:"rgba(0,0,0,.6)",zIndex:100,display:"flex",alignItems:"center",justifyContent:"center"}},
    h('div',{style:{background:"#1e293b",borderRadius:12,padding:24,width:wide?"90vw":"420px",maxWidth:"95vw",maxHeight:"90vh",overflowY:"auto",border:"1px solid #334155"}},
      h('div',{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}},
        h('b',{style:{fontSize:16}},title),
        h('button',{onClick:onClose,style:{background:"none",border:"none",color:"#94a3b8",fontSize:20,cursor:"pointer"}},"×")
      ),
      children
    )
  );
}
function ZGBar({v}) {
  const c=v>=90?"#22c55e":v>=70?"#6366f1":v>=50?"#f59e0b":"#ef4444";
  return h('div',null,
    h('div',{style:{background:"#0f172a",borderRadius:99,height:8,width:"100%",marginTop:4}},
      h('div',{style:{width:`${Math.min(v,100)}%`,background:c,height:"100%",borderRadius:99}})
    ),
    h('div',{style:{textAlign:"right",fontSize:11,color:c,marginTop:2}},v.toFixed(1)+"%")
  );
}

function App() {
  const [tab,setTab]=useState("dashboard");
  const [ma,setMA]=useState(initMAWithZG);
  const [auf,setAuf]=useState(initAuf);
  const [search,setSearch]=useState("");
  const [statusFilter,setStatusFilter]=useState("alle");
  const [year,setYear]=useState(CY);
  const [kapYear,setKapYear]=useState(CY);
  const [aModal,setAModal]=useState(null);
  const [aForm,setAForm]=useState({});
  const [maModal,setMAModal]=useState(null);
  const [maForm,setMAForm]=useState({});
  const [kapModal,setKapModal]=useState(null);
  const [istModal,setIstModal]=useState(null);
  const [istVal,setIstVal]=useState("");
  const [ganttStart,setGanttStart]=useState(fmtDate(addD(today,-2)));
  const [ganttDays,setGanttDays]=useState(28);
  const [expanded,setExpanded]=useState({});
  const COL_W=26,ROW_H=34,LABEL_W=170;

  const allKWs=useMemo(()=>allKWsOfYear(year),[year]);
  const allKWsKap=useMemo(()=>allKWsOfYear(kapYear),[kapYear]);
  const maMap=useMemo(()=>Object.fromEntries(ma.map(m=>[m.id,m])),[ma]);
  const applyUpdate=useCallback((nextAuf,nextMA)=>{
    const maWithZG=nextMA.map(m=>{const zg=calcZeitgrad(m.id,nextAuf);return {...m,zeitgrad:zg??m.zeitgrad};});
    setMA(maWithZG); setAuf(autoSchedule(nextAuf,maWithZG));
  },[]);
  const geplantH=(a,zg)=>{const z=zg??maMap[a.maId]?.zeitgrad??100;if(!a.vorgabe||z<=0)return 0;return +(a.vorgabe/(z/100)).toFixed(2);};

  const verplantProKW=useMemo(()=>{
    const res={};
    auf.filter(a=>a.start&&a.end).forEach(a=>{
      const zg=maMap[a.maId]?.zeitgrad??100; const gh=geplantH(a,zg);
      const ds=Math.max(1,diffD(a.start,a.end)+1); const hpd=gh/ds;
      let cur=parseD(a.start),end=parseD(a.end);
      while(cur<=end){if(isWork(cur)){const {kw,year:y}=getKW(cur);const k=kwKey(y,kw);if(!res[k])res[k]={};res[k][a.maId]=(res[k][a.maId]||0)+hpd;res[k]._total=(res[k]._total||0)+hpd;}cur=addD(cur,1);}
    }); return res;
  },[auf,ma]);

  const dashKWs=useMemo(()=>{
    const res=[];
    for(let i=-1;i<=10;i++){let kw=todayKW.kw+i,yr=todayKW.year;if(kw<1){kw+=52;yr--;}if(kw>52){kw-=52;yr++;}const k=kwKey(yr,kw);const kapGes=ma.reduce((s,m)=>s+(m.kap?.[k]??0),0);const verp=verplantProKW[k]?._total??0;const ausl=kapGes>0?Math.round(verp/kapGes*100):0;res.push({label:`KW${pad(kw)}`,kapazitaet:+kapGes.toFixed(1),verplant:+verp.toFixed(1),auslastung:ausl});}
    return res;
  },[ma,verplantProKW]);

  const kpis=useMemo(()=>({
    offen:auf.filter(a=>a.status==="offen").length,
    laeuft:auf.filter(a=>a.status==="läuft").length,
    fertig:auf.filter(a=>a.status==="fertig").length,
    avgZG:ma.filter(m=>calcZeitgrad(m.id,auf)!==null).length?(ma.map(m=>calcZeitgrad(m.id,auf)||0).reduce((s,v)=>s+v,0)/Math.max(1,ma.filter(m=>calcZeitgrad(m.id,auf)!==null).length)).toFixed(1):"–",
  }),[auf,ma]);

  const filtered=useMemo(()=>{
    let res=auf;
    if(statusFilter!=="alle") res=res.filter(a=>a.status===statusFilter);
    const q=search.toLowerCase().trim();
    if(q) res=res.filter(a=>a.nr.toLowerCase().includes(q)||a.bez.toLowerCase().includes(q)||(maMap[a.maId]?.name||"").toLowerCase().includes(q));
    return res;
  },[auf,search,statusFilter,maMap]);

  const formGeplant=useMemo(()=>{
    if(!aForm.maId||!aForm.vorgabe)return 0;
    const m=maMap[+aForm.maId];if(!m)return 0;
    return +(parseFloat(aForm.vorgabe)/(m.zeitgrad/100)).toFixed(2);
  },[aForm,maMap]);

  const ganttDayArr=useMemo(()=>{const res=[];let d=parseD(ganttStart);for(let i=0;i<ganttDays;i++){res.push(new Date(d));d=addD(d,1);}return res;},[ganttStart,ganttDays]);
  const ganttMonths=useMemo(()=>{const months=[];let curMonth=null,startIdx=0;ganttDayArr.forEach((d,i)=>{const m=d.getMonth();if(m!==curMonth){if(curMonth!==null)months.push({label:ganttDayArr[startIdx].toLocaleDateString("de-DE",{month:"long",year:"numeric"}),startIdx,count:i-startIdx});curMonth=m;startIdx=i;}});months.push({label:ganttDayArr[startIdx].toLocaleDateString("de-DE",{month:"long",year:"numeric"}),startIdx,count:ganttDayArr.length-startIdx});return months;},[ganttDayArr]);
  const ganttMA=useMemo(()=>ma.map(m=>({...m,auftraege:auf.filter(a=>a.maId===m.id&&a.start&&a.end).sort((a,b)=>a.start.localeCompare(b.start))})),[ma,auf]);
  const toggleExpand=maId=>setExpanded(e=>({...e,[maId]:!e[maId]}));

  const openNew=()=>{setAForm({nr:"",bez:"",maId:ma[0]?.id||1,vorgabe:"",istZeit:0,status:"offen",deadline:""});setAModal("new");};
  const openEdit=a=>{setAForm({...a});setAModal("edit");};
  const saveAuf=()=>{
    if(!aForm.nr||!aForm.bez||!aForm.maId||!aForm.vorgabe)return;
    const obj={...aForm,maId:+aForm.maId,vorgabe:+aForm.vorgabe,istZeit:+(aForm.istZeit||0)};
    const next=aModal==="edit"?auf.map(a=>a.id===obj.id?obj:a):[...auf,{...obj,id:Date.now()}];
    applyUpdate(next,ma);setAModal(null);
  };
  const deleteAuf=id=>applyUpdate(auf.filter(a=>a.id!==id),ma);
  const updateStatus=(id,status)=>applyUpdate(auf.map(a=>a.id===id?{...a,status}:a),ma);
  const saveIst=()=>{const v=parseFloat(istVal);if(isNaN(v)||!istModal)return;const next=auf.map(a=>a.id===istModal.id?{...a,istZeit:v}:a);applyUpdate(next,ma);setIstModal(null);};
  const saveMA=()=>{if(!maForm.name)return;const obj={...maForm,kap:maForm.kap||{}};const nextMA=maForm.id?ma.map(x=>x.id===maForm.id?obj:x):[...ma,{...obj,id:Date.now(),zeitgrad:100,kap:{}}];applyUpdate(auf,nextMA);setMAModal(null);};
  const updateKap=(maId,k,v)=>{const nextMA=ma.map(m=>m.id===maId?{...m,kap:{...m.kap,[k]:parseFloat(v)||0}}:m);applyUpdate(auf,nextMA);};

  const TABS=[{k:"dashboard",l:"📊 Dashboard"},{k:"auftraege",l:"📋 Aufträge"},{k:"gantt",l:"📅 Gantt"},{k:"mitarbeiter",l:"👷 Mitarbeiter"},{k:"kapazitaet",l:"🗂 Kapazität"}];

  // ── RENDER TABS ──

  function renderDashboard() {
    const kpiData=[{l:"Offen",v:kpis.offen,i:"📋",c:"#f59e0b"},{l:"In Bearbeitung",v:kpis.laeuft,i:"⚙️",c:"#6366f1"},{l:"Fertiggestellt",v:kpis.fertig,i:"✅",c:"#22c55e"},{l:"Ø Zeitgrad",v:kpis.avgZG+(kpis.avgZG!=="–"?"%":""),i:"⏱️",c:"#e879f9"}];
    return h('div',null,
      h('div',{style:{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(160px,1fr))",gap:16,marginBottom:24}},
        kpiData.map(c=>h('div',{key:c.l,style:{background:"#1e293b",borderRadius:12,padding:20,border:`1px solid ${c.c}33`}},
          h('div',{style:{fontSize:24,marginBottom:8}},c.i),
          h('div',{style:{fontSize:28,fontWeight:700,color:c.c}},c.v),
          h('div',{style:{fontSize:12,color:"#64748b",marginTop:4}},c.l)
        ))
      ),
      h('div',{style:{background:"#1e293b",borderRadius:12,padding:20,marginBottom:24,border:"1px solid #334155"}},
        h('div',{style:{fontWeight:600,marginBottom:4}},"📅 Kapazität & Auslastung"),
        h('div',{style:{fontSize:12,color:"#64748b",marginBottom:12}},"Gesamtkapazität vs. verplante Stunden + Auslastung %"),
        h(ResponsiveContainer,{width:"100%",height:220},
          h(ComposedChart,{data:dashKWs},
            h(CartesianGrid,{strokeDasharray:"3 3",stroke:"#1e293b"}),
            h(XAxis,{dataKey:"label",tick:{fill:"#94a3b8",fontSize:11}}),
            h(YAxis,{yAxisId:"h",tick:{fill:"#94a3b8",fontSize:11}}),
            h(YAxis,{yAxisId:"pct",orientation:"right",tick:{fill:"#94a3b8",fontSize:11}}),
            h(Tooltip,{contentStyle:{background:"#1e293b",border:"1px solid #334155",borderRadius:8},formatter:(v,n)=>n==="Auslastung"?v+"%":v+"h"}),
            h(Legend),
            h(Bar,{yAxisId:"h",dataKey:"kapazitaet",name:"Kapazität",fill:"#334155",radius:[4,4,0,0]}),
            h(Bar,{yAxisId:"h",dataKey:"verplant",name:"Verplant",fill:"#6366f1",radius:[4,4,0,0]}),
            h(Line,{yAxisId:"pct",type:"monotone",dataKey:"auslastung",name:"Auslastung",stroke:"#f59e0b",strokeWidth:2,dot:false})
          )
        )
      ),
      h('div',{style:{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(280px,1fr))",gap:16}},
        h('div',{style:{background:"#1e293b",borderRadius:12,padding:20,border:"1px solid #334155"}},
          h('div',{style:{fontWeight:600,marginBottom:12}},"🤖 Auto-Scheduling – Reihenfolge"),
          ma.map(m=>{
            const mAuf=auf.filter(a=>a.maId===m.id&&a.status!=="fertig").sort((a,b)=>(a.start||"").localeCompare(b.start||""));
            const zg=calcZeitgrad(m.id,auf);
            return h('div',{key:m.id,style:{marginBottom:14,paddingBottom:14,borderBottom:"1px solid #0f172a"}},
              h('div',{style:{fontWeight:600,fontSize:13,marginBottom:4}},m.name," ",h('span',{style:{fontSize:11,color:m.zeitgrad>=90?"#22c55e":m.zeitgrad>=70?"#6366f1":"#f59e0b"}},`ZG: ${zg!=null?zg.toFixed(1)+"%":"–"}`)),
              mAuf.length===0
                ? h('div',{style:{fontSize:12,color:"#475569"}},"– keine aktiven Aufträge")
                : mAuf.map((a,i)=>h('div',{key:a.id,style:{fontSize:12,color:"#94a3b8",padding:"2px 0"}},`${i+1}. ${a.nr} (${a.start||"?"}→${a.end||"?"})`))
            );
          })
        ),
        auf.filter(a=>a.status!=="fertig"&&a.end&&a.deadline&&a.end>a.deadline).length>0&&h('div',{style:{background:"#1e293b",borderRadius:12,padding:20,border:"1px solid #ef4444"}},
          h('div',{style:{fontWeight:600,marginBottom:12,color:"#ef4444"}},"⚠️ Enddatum überschreitet Deadline"),
          auf.filter(a=>a.status!=="fertig"&&a.end&&a.deadline&&a.end>a.deadline).map(a=>h('div',{key:a.id,style:{marginBottom:10,padding:10,background:"#ef444411",borderRadius:8,fontSize:12}},
            h('div',{style:{fontWeight:600}},`${a.nr} – ${a.bez}`),
            h('div',{style:{color:"#94a3b8"}},`${maMap[a.maId]?.name} · Ende: ${a.end} · Deadline: ${a.deadline}`)
          ))
        )
      )
    );
  }

  function renderAuftraege() {
    return h('div',null,
      h('div',{style:{display:"flex",gap:10,marginBottom:16,flexWrap:"wrap",alignItems:"center"}},

          const oldZG=maMap[istModal.maId]?.zeitgrad;
          return h('div',{style:{background:"#1e293b",borderRadius:6,padding:8,fontSize:12,marginBottom:8}},
            h('b',null,"Zeitgrad Vorschau: "),h('span',{style:{color:"#94a3b8"}},oldZG?.toFixed(1)+"%")," → ",h('span',{style:{color:newZG>=90?"#22c55e":newZG>=70?"#6366f1":"#f59e0b",fontWeight:700}},newZG?.toFixed(1)+"%")
          );
        })(),
        h('div',{style:{display:"flex",gap:8}},
          h(Btn,{onClick:saveIst},"✓ Speichern"),
          h(Btn,{outline:true,color:"#64748b",onClick:()=>setIstModal(null)},"Abbrechen")
        )
      ),
      maModal&&h(Modal,{title:maModal==="edit"?"Mitarbeiter bearbeiten":"Neuer Mitarbeiter",onClose:()=>setMAModal(null)},
        h(Inp,{label:"Name",value:maForm.name||"",onChange:v=>setMAForm(f=>({...f,name:v}))}),
        h(Inp,{label:"Rolle",value:maForm.rolle||"",onChange:v=>setMAForm(f=>({...f,rolle:v}))}),
        h('div',{style:{fontSize:12,color:"#64748b",marginBottom:12}},"💡 Zeitgrad wird automatisch aus fertigen Aufträgen berechnet."),
        h('div',{style:{display:"flex",gap:8}},
          h(Btn,{onClick:saveMA},"💾 Speichern"),
          h(Btn,{outline:true,color:"#64748b",onClick:()=>setMAModal(null)},"Abbrechen")
        )
      ),
      kapModal&&(()=>{
        const mObj=ma.find(x=>x.id===kapModal.id);
        return h(Modal,{title:`Kapazität: ${mObj?.name}`,onClose:()=>setKapModal(null),wide:true},
          h('div',{style:{display:"flex",gap:8,alignItems:"center",marginBottom:16}},
            h(Btn,{sm:true,onClick:()=>setKapYear(y=>y-1)},`◀ ${kapYear-1}`),
            h('span',{style:{fontWeight:700,minWidth:50,textAlign:"center"}},kapYear),
            h(Btn,{sm:true,onClick:()=>setKapYear(y=>y+1)},`${kapYear+1} ▶`),
            h('span',{style:{fontSize:12,color:"#64748b"}},"h/Woche → löst Neuplanung aus")
          ),
          h('div',{style:{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(120px,1fr))",gap:8,maxHeight:400,overflowY:"auto"}},
            allKWsKap.map(w=>{
              const isCur=w.kw===todayKW.kw&&w.year===todayKW.year;
              const val=mObj?.kap?.[w.key]??"";
              return h('div',{key:w.key,style:{background:isCur?"#6366f122":"#0f172a",borderRadius:8,padding:8,border:isCur?"1px solid #6366f1":"1px solid #1e293b"}},
                h('div',{style:{fontSize:11,color:isCur?"#6366f1":"#64748b",marginBottom:4,fontWeight:isCur?700:400}},w.label),
                h('div',{style:{display:"flex",alignItems:"center",gap:4}},
                  h('input',{type:"number",min:0,max:60,value:val,onChange:e=>updateKap(kapModal.id,w.key,e.target.value),placeholder:"h",style:{width:"100%",background:"#1e293b",border:"1px solid #334155",borderRadius:5,padding:"4px 6px",color:"#f1f5f9",fontSize:12}}),
                  h('span',{style:{fontSize:10,color:"#475569"}},"h")
                )
              );
            })
          ),
          h('div',{style:{marginTop:16}},h(Btn,{onClick:()=>setKapModal(null)},"✓ Fertig"))
        );
      })()
    );
  }

  return h('div',{style:{minHeight:"100vh",background:"#0a0f1e"}},
    // Header
    h('div',{style:{background:"#0f172a",borderBottom:"1px solid #1e293b",padding:"16px 24px",display:"flex",alignItems:"center",gap:12}},
      h('span',{style:{fontSize:24}},"🔧"),
      h('div',null,
        h('div',{style:{fontWeight:700,fontSize:18,color:"#f1f5f9"}},"Produktions-Dashboard"),
        h('div',{style:{fontSize:12,color:"#64748b"}},"Auftragsplanung · Zeitgrad · Auto-Scheduling")
      ),
      h('div',{style:{marginLeft:"auto",fontSize:12,color:"#64748b"}},today.toLocaleDateString("de-DE",{weekday:"long",day:"2-digit",month:"long",year:"numeric"}))
    ),
    // Tabs
    h('div',{style:{display:"flex",gap:0,borderBottom:"1px solid #1e293b",background:"#0f172a",overflowX:"auto",padding:"0 24px"}},
      TABS.map(t=>h('button',{key:t.k,onClick:()=>setTab(t.k),style:{padding:"10px 13px",background:"none",border:"none",borderBottom:tab===t.k?"2px solid #6366f1":"2px solid transparent",color:tab===t.k?"#6366f1":"#94a3b8",cursor:"pointer",fontWeight:tab===t.k?700:400,fontSize:13,whiteSpace:"nowrap"}},t.l))
    ),
    // Content
    h('div',{style:{padding:24,maxWidth:1400,margin:"0 auto"}},
      tab==="dashboard"&&renderDashboard(),
      tab==="auftraege"&&renderAuftraege(),
      tab==="gantt"&&renderGantt(),
      tab==="mitarbeiter"&&renderMitarbeiter(),
      tab==="kapazitaet"&&renderKapazitaet()
    ),
    renderModals()
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
} // end initApp
</script>
</body>
</html>

::-webkit-scrollbar-track{background:#1e293b}

button,input,select{font-family:inherit;cursor:pointer}
#app{min-height:100vh}
.tab{padding:10px 13px;background:none;border:none;border-bottom:2px solid transparent;color:#94a3b8;font-weight:400;font-size:13px;white-space:nowrap;cursor:pointer}
.tab.active{border-bottom-color:#6366f1;color:#6366f1;font-weight:700}
.form-group{margin-bottom:10px}
.form-group label{display:block;font-size:12px;color:#94a3b8;margin-bottom:4px}
.form-group input,.form-group select{width:100%;background:#0f172a;border:1px solid #334155;border-radius:6px;padding:7px 10px;color:#f1f5f9;font-size:13px}
</style>
</head>
<body>
<div id="app"><div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#6366f1;font-size:20px">⏳ Lädt...</div></div>
<script>
(function() {
'use strict';

// ── DOM helpers (no name conflicts with event params) ──
function cel(tag, styleObj, children) {
  var el = document.createElement(tag);
  if (styleObj) Object.assign(el.style, styleObj);
  if (Array.isArray(children)) {
    children.forEach(function(c) { if (c != null) el.appendChild(typeof c === 'string' ? document.createTextNode(c) : c); });
  } else if (children != null) {
    el.appendChild(typeof children === 'string' ? document.createTextNode(children) : children);
  }
  return el;
}
function cdiv(styleObj, children) { return cel('div', styleObj, children); }
function cspan(styleObj, text) { var s = document.createElement('span'); if(styleObj) Object.assign(s.style, styleObj); s.textContent = text||''; return s; }
function cbtn(text, color, sm, onClick, outline) {
  var b = document.createElement('button');
  var c = color || '#6366f1';
  b.style.cssText = 'padding:'+(sm?'5px 10px':'8px 16px')+';background:'+(outline?'transparent':c)+';border:1px solid '+c+';border-radius:7px;color:'+(outline?c:'#fff')+';font-size:'+(sm?'12':'13')+'px;font-weight:600;cursor:pointer;';
  b.textContent = text;
  b.onclick = onClick;
  return b;
}
function cinp(label, val, onChangeFn, optsList) {
  var wrap = document.createElement('div'); wrap.className = 'form-group';
  if (label) { var lbl = document.createElement('label'); lbl.textContent = label; wrap.appendChild(lbl); }
  var field;
  if (optsList) {
    field = document.createElement('select');
    optsList.forEach(function(o) {
      var op = document.createElement('option');
      op.value = (o.v != null ? o.v : o);
      op.textContent = (o.l != null ? o.l : o);
      if (String(o.v != null ? o.v : o) === String(val)) op.selected = true;
      field.appendChild(op);
    });
    field.onchange = function(ev) { onChangeFn(ev.target.value); };
  } else {
    field = document.createElement('input');
    field.value = val || '';
    field.oninput = function(ev) { onChangeFn(ev.target.value); };
  }
  wrap.appendChild(field);
  return wrap;
}
function cinpType(label, type, val, onChangeFn) {
  var wrap = document.createElement('div'); wrap.className = 'form-group';
  if (label) { var lbl = document.createElement('label'); lbl.textContent = label; wrap.appendChild(lbl); }
  var field = document.createElement('input');
  field.type = type; field.value = val || '';
  field.oninput = function(ev) { onChangeFn(ev.target.value); };
  wrap.appendChild(field);
  return wrap;
}
function cmodal(title, onCloseFn, wide, contentArr) {
  var overlay = cdiv({position:'fixed',inset:0,background:'rgba(0,0,0,.65)',zIndex:100,display:'flex',alignItems:'center',justifyContent:'center'});
  var box = document.createElement('div');
  box.style.cssText = 'background:#1e293b;border-radius:12px;padding:24px;width:'+(wide?'90vw':'420px')+';max-width:95vw;max-height:90vh;overflow-y:auto;border:1px solid #334155;';
  var hdr = cdiv({display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'16px'}, [
    cel('b', {fontSize:'16px'}, title),
    cbtn('×', '#64748b', true, onCloseFn, true)
  ]);
  box.appendChild(hdr);
  contentArr.forEach(function(c) { if(c) box.appendChild(c); });
  overlay.appendChild(box);
  return overlay;
}

// ── Helpers ──
var pad = function(n) { return String(n).padStart(2,'0'); };
var fmtDate = function(d) {
  if (!d) return '';
  var x = d instanceof Date ? d : new Date(d);
  return x.getFullYear()+'-'+pad(x.getMonth()+1)+'-'+pad(x.getDate());
};
var parseD = function(s) { var d = new Date(s); d.setHours(0,0,0,0); return d; };
var addD = function(d, n) { var x = new Date(d); x.setDate(x.getDate()+n); return x; };
var diffD = function(a, b) { return Math.round((parseD(b)-parseD(a))/86400000); };
var isWork = function(d) { return d.getDay()!==0 && d.getDay()!==6; };
var nextWork = function(d) { var x = new Date(d); while(!isWork(x)) x = addD(x,1); return x; };
var getKW = function(d) {
  var t = new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
  t.setUTCDate(t.getUTCDate()+4-(t.getUTCDay()||7));
  var y = new Date(Date.UTC(t.getUTCFullYear(),0,1));
  return {kw:Math.ceil((((t-y)/86400000)+1)/7), year:t.getUTCFullYear()};
};
var kwKey = function(yr, kw) { return yr+'-W'+pad(kw); };
var mondayOfKW = function(yr, kw) {
  var j = new Date(yr,0,4), m = new Date(j);
  m.setDate(j.getDate()-((j.getDay()||7)-1)+(kw-1)*7);
  m.setHours(0,0,0,0); return m;
};
var allKWsOfYear = function(yr) {
  var res = [];
  for (var kw=1; kw<=53; kw++) {
    var mon = mondayOfKW(yr, kw);
    if (mon.getFullYear() > yr && kw > 1) break;
    if (mon.getFullYear() < yr) continue;
    res.push({kw:kw, year:yr, key:kwKey(yr,kw), label:'KW'+pad(kw), monday:mon});
  }
  return res;
};
var today = new Date(); today.setHours(0,0,0,0);
var CY = today.getFullYear();
var todayKW = getKW(today);
var S_COL = {offen:'#f59e0b', 'läuft':'#6366f1', fertig:'#22c55e'};
var STATUS_OPTS = ['alle','offen','läuft','fertig'];
var getKap = function(ma, k) { return (ma.kap && ma.kap[k]) || 0; };

function calcZeitgrad(maId, auf) {
  var rel = auf.filter(function(a) { return a.maId===maId && a.status==='fertig' && a.vorgabe>0; });
  var ss = rel.reduce(function(s,a){return s+a.vorgabe;},0);
  var si = rel.reduce(function(s,a){return s+(a.istZeit||0);},0);
  if (!ss || !rel.length) return null;
  return +(si/ss*100).toFixed(1);
}
function findNextCapDay(from, ma) {
  var cur = new Date(from);
  while (!isWork(cur)) cur = addD(cur,1);
  for (var i=0; i<500; i++) {
    if (isWork(cur)) {
      var kw = getKW(cur);
      if (getKap(ma, kwKey(kw.year, kw.kw)) > 0) return cur;
      cur = addD(mondayOfKW(kw.year, kw.kw), 7);
    } else cur = addD(cur,1);
  }
  return cur;
}
function autoSchedule(auftraege, maList) {
  var result = auftraege.map(function(a) { return Object.assign({}, a); });
  maList.forEach(function(ma) {
    var zg = ma.zeitgrad != null ? ma.zeitgrad : 100;
    var active = result.filter(function(a) { return a.maId===ma.id && a.status!=='fertig'; });
    active.sort(function(a,b) {
      var da=a.deadline||'9999-12-31', db=b.deadline||'9999-12-31';
      return da<db?-1:da>db?1:a.id-b.id;
    });
    var curDay = findNextCapDay(nextWork(today), ma);
    var ckw = getKW(curDay);
    var remainingToday = getKap(ma, kwKey(ckw.year, ckw.kw)) / 5;
    active.forEach(function(a) {
      var gh = zg > 0 ? +(a.vorgabe / (zg/100)).toFixed(4) : a.vorgabe;
      var remaining = gh, cur = new Date(curDay), curRem = remainingToday;
      a.start = fmtDate(cur); var lastDay = new Date(cur);
      while (remaining > 0.0001) {
        var kw = getKW(cur), k = kwKey(kw.year, kw.kw), kapW = getKap(ma, k);
        if (!kapW) {
          cur = findNextCapDay(addD(cur,1), ma);
          var nkw = getKW(cur); curRem = getKap(ma, kwKey(nkw.year, nkw.kw)) / 5;
          a.start = a.start || fmtDate(cur); continue;
        }
        if (curRem <= 0) {
          cur = addD(cur,1); while(!isWork(cur)) cur = addD(cur,1);
          var nkw2 = getKW(cur);
          if (!getKap(ma, kwKey(nkw2.year, nkw2.kw))) cur = findNextCapDay(cur, ma);
          var fkw = getKW(cur); curRem = getKap(ma, kwKey(fkw.year, fkw.kw)) / 5; continue;
        }
        var consume = Math.min(remaining, curRem);
        remaining -= consume; curRem -= consume; lastDay = new Date(cur);
        if (remaining <= 0.0001) break;
        if (curRem <= 0.0001) {
          cur = addD(cur,1); while(!isWork(cur)) cur = addD(cur,1);
          var nkw3 = getKW(cur);
          if (!getKap(ma, kwKey(nkw3.year, nkw3.kw))) cur = findNextCapDay(cur, ma);
          var fkw2 = getKW(cur); curRem = getKap(ma, kwKey(fkw2.year, fkw2.kw)) / 5;
        }
      }
      a.end = fmtDate(lastDay); curDay = new Date(lastDay); remainingToday = curRem <= 0.0001 ? 0 : curRem;
      var idx = result.findIndex(function(r){return r.id===a.id;}); if(idx>=0) result[idx]=a;
    });
  });
  return result;
}

// ── Initial data ──
var initMA = [
  {id:1,name:'Thomas Müller',rolle:'Schlosser',zeitgrad:85,kap:{}},
  {id:2,name:'Anna Schmidt',rolle:'Lackiererin',zeitgrad:92,kap:{}},
  {id:3,name:'Klaus Weber',rolle:'Monteur',zeitgrad:75,kap:{}},
  {id:4,name:'Sara Braun',rolle:'CNC-Fräser',zeitgrad:100,kap:{}}
];
var initRaw = [
  {id:1,nr:'AU-1001',bez:'Stahlrahmen Charge A',maId:1,vorgabe:8,istZeit:0,status:'offen',deadline:fmtDate(addD(today,10))},
  {id:2,nr:'AU-1002',bez:'Schweißnaht Rahmen C',maId:1,vorgabe:10,istZeit:0,status:'offen',deadline:fmtDate(addD(today,20))},
  {id:3,nr:'AU-1003',bez:'Lackierung Türen',maId:2,vorgabe:5,istZeit:4,status:'läuft',deadline:fmtDate(addD(today,5))},
  {id:4,nr:'AU-1004',bez:'Montage Gestell B',maId:3,vorgabe:12,istZeit:13,status:'fertig',deadline:fmtDate(addD(today,-2)),start:fmtDate(addD(today,-10)),end:fmtDate(addD(today,-2))},
  {id:5,nr:'AU-1005',bez:'CNC Fräsung #7',maId:4,vorgabe:6,istZeit:0,status:'offen',deadline:fmtDate(addD(today,8))},
  {id:6,nr:'AU-1006',bez:'Wartung Maschine B',maId:1,vorgabe:4,istZeit:0,status:'offen',deadline:fmtDate(addD(today,6))}
];

// ── App state ──
var ST = {
  tab:'dashboard', search:'', statusFilter:'alle',
  year:CY, kapYear:CY,
  ganttStart:fmtDate(addD(today,-2)), ganttDays:28, expanded:{},
  aModal:null, aForm:{}, maModal:null, maForm:{}, kapModal:null, istModal:null, istVal:'',
  ma: initMA.map(function(m){ var zg=calcZeitgrad(m.id,initRaw); return Object.assign({},m,{zeitgrad:zg!=null?zg:m.zeitgrad}); }),
  auf: null
};
ST.auf = autoSchedule(initRaw, ST.ma);

function applyUpdate(nextAuf, nextMA) {
  var maWZG = nextMA.map(function(m){ var zg=calcZeitgrad(m.id,nextAuf); return Object.assign({},m,{zeitgrad:zg!=null?zg:m.zeitgrad}); });
  ST.ma = maWZG; ST.auf = autoSchedule(nextAuf, maWZG); render();
}
function getMM() { var m={}; ST.ma.forEach(function(x){m[x.id]=x;}); return m; }
function geplantH(a, m) {
  var zg = m ? m.zeitgrad : 100;
  if (!a.vorgabe || zg <= 0) return 0;
  return +(a.vorgabe/(zg/100)).toFixed(2);
}

// ── SVG chart (no external libs needed) ──
function buildChart(data) {
  var W=560, H=180, PL=38, PR=30, PT=8, PB=28;
  var cW=W-PL-PR, cH=H-PT-PB;
  var maxH=Math.max.apply(null, data.map(function(d){return Math.max(d.kapazitaet,d.verplant);}));
  maxH = maxH || 1;
  var maxP = Math.max.apply(null, data.map(function(d){return d.auslastung;})) || 1;
  var bW = Math.floor(cW/data.length) - 2;
  var svgParts = ['<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;max-height:200px">'];
  // Grid lines
  for (var gi=0; gi<=4; gi++) {
    var gy = PT + cH - (gi/4)*cH;
    svgParts.push('<line x1="'+PL+'" y1="'+gy+'" x2="'+(W-PR)+'" y2="'+gy+'" stroke="#1e293b" stroke-width="1"/>');
    svgParts.push('<text x="'+(PL-3)+'" y="'+(gy+4)+'" text-anchor="end" fill="#475569" font-size="9">'+Math.round(maxH/4*gi)+'</text>');
  }
  // Bars
  data.forEach(function(d, i) {
    var x = PL + i*(cW/data.length) + ((cW/data.length)-bW)/2;
    var h1 = Math.max(1, (d.kapazitaet/maxH)*cH);
    var h2 = Math.max(1, (d.verplant/maxH)*cH);
    svgParts.push('<rect x="'+x+'" y="'+(PT+cH-h1)+'" width="'+(bW/2)+'" height="'+h1+'" fill="#334155" rx="2"/>');
    svgParts.push('<rect x="'+(x+bW/2)+'" y="'+(PT+cH-h2)+'" width="'+(bW/2)+'" height="'+h2+'" fill="#6366f1" rx="2"/>');
    if (i%2===0) svgParts.push('<text x="'+(x+bW/2)+'" y="'+(H-5)+'" text-anchor="middle" fill="#64748b" font-size="9">'+d.label+'</text>');
  });
  // Auslastung line
  var pts = data.map(function(d,i) {
    var x = PL + i*(cW/data.length) + (cW/data.length)/2;
    var y = PT + cH - (d.auslastung/maxP)*cH;
    return x+','+y;
  }).join(' ');
  svgParts.push('<polyline points="'+pts+'" fill="none" stroke="#f59e0b" stroke-width="2"/>');
  data.forEach(function(d,i) {
    var x = PL + i*(cW/data.length) + (cW/data.length)/2;
    var y = PT + cH - (d.auslastung/maxP)*cH;
    svgParts.push('<circle cx="'+x+'" cy="'+y+'" r="3" fill="#f59e0b"/>');
  });
  svgParts.push('</svg>');
  return svgParts.join('');
}

// ── Tab renderers ──
function renderDashboard(mm) {
  var wrap = cdiv(null);
  // KPIs
  var kpiGrid = cdiv({display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(160px,1fr))',gap:'16px',marginBottom:'24px'});
  var offen = ST.auf.filter(function(a){return a.status==='offen';}).length;
  var laeuft = ST.auf.filter(function(a){return a.status==='läuft';}).length;
  var fertig = ST.auf.filter(function(a){return a.status==='fertig';}).length;
  var fertigMAs = ST.ma.filter(function(m){return calcZeitgrad(m.id,ST.auf)!==null;});
  var avgZG = fertigMAs.length ? (ST.ma.map(function(m){return calcZeitgrad(m.id,ST.auf)||0;}).reduce(function(s,v){return s+v;},0)/fertigMAs.length).toFixed(1) : '–';
  [{l:'Offen',v:offen,i:'📋',c:'#f59e0b'},{l:'In Bearbeitung',v:laeuft,i:'⚙️',c:'#6366f1'},{l:'Fertiggestellt',v:fertig,i:'✅',c:'#22c55e'},{l:'Ø Zeitgrad',v:avgZG+(avgZG!=='–'?'%':''),i:'⏱️',c:'#e879f9'}].forEach(function(kpi) {
    var card = cdiv({background:'#1e293b',borderRadius:'12px',padding:'20px',border:'1px solid '+kpi.c+'33'}, [
      cdiv({fontSize:'24px',marginBottom:'8px'}, kpi.i),
      cdiv({fontSize:'28px',fontWeight:700,color:kpi.c}, String(kpi.v)),
      cdiv({fontSize:'12px',color:'#64748b',marginTop:'4px'}, kpi.l)
    ]);
    kpiGrid.appendChild(card);
  });
  wrap.appendChild(kpiGrid);

  // Chart
  var vpKW = {};
  ST.auf.filter(function(a){return a.start&&a.end;}).forEach(function(a) {
    var gh = geplantH(a, mm[a.maId]);
    var ds = Math.max(1, diffD(a.start,a.end)+1), hpd = gh/ds;
    var cur = parseD(a.start), end = parseD(a.end);
    while(cur<=end){if(isWork(cur)){var kw=getKW(cur);var k=kwKey(kw.year,kw.kw);vpKW[k]=(vpKW[k]||0)+hpd;}cur=addD(cur,1);}
  });
  var dashKWs = [];
  for (var di=-1; di<=10; di++) {
    var dkw=todayKW.kw+di, dyr=todayKW.year;
    if(dkw<1){dkw+=52;dyr--;} if(dkw>52){dkw-=52;dyr++;}
    var dk=kwKey(dyr,dkw);
    var kapGes=ST.ma.reduce(function(s,m){return s+getKap(m,dk);},0);
    var verp=vpKW[dk]||0;
    var ausl=kapGes>0?Math.round(verp/kapGes*100):0;
    dashKWs.push({label:'KW'+pad(dkw),kapazitaet:+kapGes.toFixed(1),verplant:+verp.toFixed(1),auslastung:ausl});
  }
  var chartCard = cdiv({background:'#1e293b',borderRadius:'12px',padding:'20px',marginBottom:'24px',border:'1px solid #334155'});
  chartCard.appendChild(cdiv({fontWeight:700,marginBottom:'4px'},'📅 Kapazität & Auslastung'));
  var legend = cdiv({display:'flex',gap:'16px',fontSize:'11px',marginBottom:'8px',flexWrap:'wrap'}, [
    cspan({color:'#334155'},'■ Kapazität  '),cspan({color:'#6366f1'},'■ Verplant  '),cspan({color:'#f59e0b'},'— Auslastung %')
  ]);
  chartCard.appendChild(legend);
  var svgWrap = document.createElement('div');
  svgWrap.innerHTML = buildChart(dashKWs);
  chartCard.appendChild(svgWrap);
  wrap.appendChild(chartCard);

  // Scheduling
  var row = cdiv({display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(280px,1fr))',gap:'16px'});
  var schedCard = cdiv({background:'#1e293b',borderRadius:'12px',padding:'20px',border:'1px solid #334155'});
  schedCard.appendChild(cdiv({fontWeight:600,marginBottom:'12px'},'🤖 Auto-Scheduling'));
  ST.ma.forEach(function(m) {
    var mAuf = ST.auf.filter(function(a){return a.maId===m.id&&a.status!=='fertig';}).sort(function(a,b){return (a.start||'').localeCompare(b.start||'');});
    var zg = calcZeitgrad(m.id, ST.auf);
    var sec = cdiv({marginBottom:'12px',paddingBottom:'12px',borderBottom:'1px solid #0f172a'});
    var zgColor = m.zeitgrad>=90?'#22c55e':m.zeitgrad>=70?'#6366f1':'#f59e0b';
    sec.appendChild(cdiv({fontWeight:600,fontSize:'13px',marginBottom:'4px'}, m.name+' '+cspan({fontSize:'11px',color:zgColor},'ZG: '+(zg!=null?zg.toFixed(1)+'%':'–'))));
    if (!mAuf.length) sec.appendChild(cdiv({fontSize:'12px',color:'#475569'},'– keine aktiven Aufträge'));
    else mAuf.forEach(function(a,i){ sec.appendChild(cdiv({fontSize:'12px',color:'#94a3b8',padding:'2px 0'},(i+1)+'. '+a.nr+' ('+(a.start||'?')+'→'+(a.end||'?')+')'));});
    schedCard.appendChild(sec);
  });
  row.appendChild(schedCard);
  var warnings = ST.auf.filter(function(a){return a.status!=='fertig'&&a.end&&a.deadline&&a.end>a.deadline;});
  if (warnings.length) {
    var wCard = cdiv({background:'#1e293b',borderRadius:'12px',padding:'20px',border:'1px solid #ef4444'});
    wCard.appendChild(cdiv({fontWeight:600,marginBottom:'12px',color:'#ef4444'},'⚠️ Deadline gefährdet'));
    warnings.forEach(function(a) {
      var w = cdiv({marginBottom:'10px',padding:'10px',background:'#ef444411',borderRadius:'8px',fontSize:'12px'}, [
        cdiv({fontWeight:600}, a.nr+' – '+a.bez),
        cdiv({color:'#94a3b8'}, ((mm[a.maId]&&mm[a.maId].name)||'')+' · Ende: '+a.end+' · Deadline: '+a.deadline)
      ]);
      wCard.appendChild(w);
    });
    row.appendChild(wCard);
  }
  wrap.appendChild(row);
  return wrap;
}

function renderAuftraege(mm) {
  var wrap = cdiv(null);
  var bar = cdiv({display:'flex',gap:'10px',marginBottom:'16px',flexWrap:'wrap',alignItems:'center'});
  var si = document.createElement('input');
  si.placeholder='🔍 Nr., Bezeichnung, Mitarbeiter...'; si.value=ST.search||'';
  si.style.cssText='flex:1;min-width:180px;background:#1e293b;border:1px solid #334155;border-radius:8px;padding:8px 12px;color:#f1f5f9;font-size:13px;';
  si.oninput = function(ev){ ST.search=ev.target.value; render(); };
  bar.appendChild(si);
  var sbBtns = cdiv({display:'flex',gap:'6px',flexWrap:'wrap'});
  STATUS_OPTS.forEach(function(s) {
    var active = ST.statusFilter===s;
    var c = s==='alle'?'#6366f1':(S_COL[s]||'#6366f1');
    var b = document.createElement('button');
    b.style.cssText='padding:6px 12px;border-radius:7px;border:1px solid '+c+';background:'+(active?c:'transparent')+';color:'+(active?'#fff':c)+';cursor:pointer;font-size:12px;font-weight:600;white-space:nowrap;';
    b.textContent = s==='alle'?'Alle':s;
    b.onclick = function(){ ST.statusFilter=s; render(); };
    sbBtns.appendChild(b);
  });
  bar.appendChild(sbBtns);
  bar.appendChild(cbtn('+ Neuer Auftrag','#6366f1',false,function(){
    ST.aForm={nr:'',bez:'',maId:ST.ma[0]&&ST.ma[0].id||1,vorgabe:'',istZeit:0,status:'offen',deadline:''};
    ST.aModal='new'; render();

        var obj=Object.assign({},f,{maId:+f.maId,vorgabe:+f.vorgabe,istZeit:+(f.istZeit||0)});
        var next=ST.aModal==='edit'?ST.auf.map(function(a){return a.id===obj.id?obj:a;}):[].concat(ST.auf,[Object.assign({},obj,{id:Date.now()})]);
        applyUpdate(next,ST.ma);ST.aModal=null;render();
      }),
      cbtn('Abbrechen','#64748b',false,function(){ST.aModal=null;render();},true)
    ]));
    app.appendChild(cmodal(ST.aModal==='edit'?'Auftrag bearbeiten':'Neuer Auftrag',function(){ST.aModal=null;render();},true,fields));
  }
  if(ST.istModal){
    var a=ST.istModal;
    app.appendChild(cmodal('Ist-Zeit eintragen',function(){ST.istModal=null;render();},false,[
      cdiv({fontWeight:600,marginBottom:'4px'},a.bez),
      cdiv({fontSize:'12px',color:'#64748b',marginBottom:'12px'},'Vorgabe: '+a.vorgabe+'h'),
      cinpType('Ist-Zeit (h)','number',ST.istVal,function(v){ST.istVal=v;render();}),
      cdiv({display:'flex',gap:'8px'},[
        cbtn('✓ Speichern','#6366f1',false,function(){
          var v=parseFloat(ST.istVal);if(isNaN(v))return;
          var aId=ST.istModal.id;
          var next=ST.auf.map(function(x){return x.id===aId?Object.assign({},x,{istZeit:v}):x;});
          applyUpdate(next,ST.ma);ST.istModal=null;render();
        }),
        cbtn('Abbrechen','#64748b',false,function(){ST.istModal=null;render();},true)
      ])
    ]));
  }
  if(ST.maModal){
    var mf=ST.maForm;
    app.appendChild(cmodal(ST.maModal==='edit'?'Mitarbeiter bearbeiten':'Neuer Mitarbeiter',function(){ST.maModal=null;render();},false,[
      cinp('Name',mf.name||'',function(v){ST.maForm.name=v;render();}),
      cinp('Rolle',mf.rolle||'',function(v){ST.maForm.rolle=v;render();}),
      cdiv({fontSize:'12px',color:'#64748b',marginBottom:'12px'},'💡 Zeitgrad wird automatisch berechnet.'),
      cdiv({display:'flex',gap:'8px'},[
        cbtn('💾 Speichern','#6366f1',false,function(){
          if(!mf.name)return;
          var obj=Object.assign({},mf,{kap:mf.kap||{}});
          var nextMA=mf.id?ST.ma.map(function(x){return x.id===mf.id?obj:x;}):[].concat(ST.ma,[Object.assign({},obj,{id:Date.now(),zeitgrad:100,kap:{}})]);
          applyUpdate(ST.auf,nextMA);ST.maModal=null;render();
        }),
        cbtn('Abbrechen','#64748b',false,function(){ST.maModal=null;render();},true)
      ])
    ]));
  }
  if(ST.kapModal){
    var km=ST.ma.find(function(x){return x.id===ST.kapModal.id;});
    var kwGrid=cdiv({display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(120px,1fr))',gap:'8px',maxHeight:'400px',overflowY:'auto'});
    allKWsOfYear(ST.kapYear).forEach(function(w){
      var isCur=w.kw===todayKW.kw&&w.year===todayKW.year;
      var val=km&&getKap(km,w.key)||'';
      var cell=cdiv({background:isCur?'#6366f122':'#0f172a',borderRadius:'8px',padding:'8px',border:isCur?'1px solid #6366f1':'1px solid #1e293b'});
      cell.appendChild(cdiv({fontSize:'11px',color:isCur?'#6366f1':'#64748b',marginBottom:'4px'},w.label));
      var ki2=document.createElement('input');ki2.type='number';ki2.min=0;ki2.max=60;ki2.value=val;ki2.placeholder='h';
      ki2.style.cssText='width:100%;background:#1e293b;border:1px solid #334155;border-radius:5px;padding:4px 6px;color:#f1f5f9;font-size:12px;';
      var wk=w.key,kmId=ST.kapModal.id;
      ki2.oninput=function(ev){var nextMA=ST.ma.map(function(mx){return mx.id===kmId?Object.assign({},mx,{kap:Object.assign({},mx.kap,{[wk]:parseFloat(ev.target.value)||0})}):mx;});applyUpdate(ST.auf,nextMA);};
      cell.appendChild(ki2);kwGrid.appendChild(cell);
    });
    app.appendChild(cmodal('Kapazität: '+(km&&km.name),function(){ST.kapModal=null;render();},true,[
      cdiv({display:'flex',gap:'8px',alignItems:'center',marginBottom:'16px'},[
        cbtn('◀ '+(ST.kapYear-1),'#6366f1',true,function(){ST.kapYear--;render();}),
        cdiv({fontWeight:700,minWidth:'50px',textAlign:'center'},String(ST.kapYear)),
        cbtn((ST.kapYear+1)+' ▶','#6366f1',true,function(){ST.kapYear++;render();}),
        cdiv({fontSize:'12px',color:'#64748b'},'h/Woche')
      ]),
      kwGrid,
      cdiv({marginTop:'16px'},cbtn('✓ Fertig','#6366f1',false,function(){ST.kapModal=null;render();}))
    ]));
  }
}

// ── Main render ──
function render() {
  try {
    var app = document.getElementById('app');
    app.innerHTML = '';
    var mm = getMM();
    // Header
    var header = cdiv({background:'#0f172a',borderBottom:'1px solid #1e293b',padding:'16px 24px',display:'flex',alignItems:'center',gap:'12px'}, [
      cspan({fontSize:'24px'},'🔧'),
      cdiv(null,[cdiv({fontWeight:700,fontSize:'18px',color:'#f1f5f9'},'Produktions-Dashboard'),cdiv({fontSize:'12px',color:'#64748b'},'Auftragsplanung · Zeitgrad · Auto-Scheduling')]),
      cdiv({marginLeft:'auto',fontSize:'12px',color:'#64748b'},today.toLocaleDateString('de-DE',{weekday:'long',day:'2-digit',month:'long',year:'numeric'}))
    ]);
    app.appendChild(header);
    // Tabs
    var tabBar = cdiv({display:'flex',borderBottom:'1px solid #1e293b',background:'#0f172a',overflowX:'auto',padding:'0 24px'});
    [['dashboard','📊 Dashboard'],['auftraege','📋 Aufträge'],['gantt','📅 Gantt'],['mitarbeiter','👷 Mitarbeiter'],['kapazitaet','🗂 Kapazität']].forEach(function(tk){
      var t=document.createElement('button'); t.className='tab'+(ST.tab===tk[0]?' active':'');
      t.textContent=tk[1]; t.onclick=function(){ST.tab=tk[0];render();};
      tabBar.appendChild(t);
    });
    app.appendChild(tabBar);
    // Content
    var content = cdiv({padding:'24px',maxWidth:'1400px',margin:'0 auto'});
    if(ST.tab==='dashboard') content.appendChild(renderDashboard(mm));
    else if(ST.tab==='auftraege') content.appendChild(renderAuftraege(mm));
    else if(ST.tab==='gantt') content.appendChild(renderGantt(mm));
    else if(ST.tab==='mitarbeiter') content.appendChild(renderMitarbeiter(mm));
    else if(ST.tab==='kapazitaet') content.appendChild(renderKapazitaet(mm));
    app.appendChild(content);
    renderModals(app, mm);
  } catch(err) {
    document.getElementById('app').innerHTML = '<div style="color:#ef4444;padding:40px;font-size:14px;background:#1e293b;margin:20px;border-radius:12px"><b>Fehler:</b><br>'+err.message+'<br><br><pre>'+err.stack+'</pre></div>';
  }
}

render();

})(); // end IIFE
</script>
</body>
</html>

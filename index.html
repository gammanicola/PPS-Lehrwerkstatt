<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Produktions-Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0f1e;color:#f1f5f9;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;font-size:14px}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:#1e293b}
::-webkit-scrollbar-thumb{background:#334155;border-radius:3px}
button{cursor:pointer;font-family:inherit}
input,select{font-family:inherit}
.btn{padding:8px 16px;background:#6366f1;border:1px solid #6366f1;border-radius:7px;color:#fff;font-size:13px;font-weight:600;cursor:pointer}
.btn:hover{opacity:.85}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-outline{background:transparent}
.card{background:#1e293b;border-radius:12px;padding:20px;border:1px solid #334155}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:100;display:flex;align-items:center;justify-content:center}
.modal{background:#1e293b;border-radius:12px;padding:24px;width:420px;max-width:95vw;max-height:90vh;overflow-y:auto;border:1px solid #334155}
.modal-wide{width:90vw}
.form-group{margin-bottom:10px}
.form-group label{display:block;font-size:12px;color:#94a3b8;margin-bottom:4px}
.form-group input,.form-group select{width:100%;background:#0f172a;border:1px solid #334155;border-radius:6px;padding:7px 10px;color:#f1f5f9;font-size:13px}
.tab-bar{display:flex;border-bottom:1px solid #1e293b;background:#0f172a;overflow-x:auto;padding:0 24px}
.tab{padding:10px 13px;background:none;border:none;border-bottom:2px solid transparent;color:#94a3b8;cursor:pointer;font-weight:400;font-size:13px;white-space:nowrap}
.tab.active{border-bottom-color:#6366f1;color:#6366f1;font-weight:700}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;margin-bottom:24px}
.kpi-card{background:#1e293b;border-radius:12px;padding:20px}
.auftrag-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}
.auftrag-card{background:#1e293b;border-radius:12px;padding:16px}
.ma-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.badge{display:inline-block;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600}
.progress-bg{background:#0f172a;border-radius:99px;height:6px}
.progress-bar{height:100%;border-radius:99px;transition:width .3s}
#app{min-height:100vh}
</style>
</head>
<body>
<div id="app"><div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#6366f1;font-size:18px">⏳ Lädt...</div></div>

<script>
// ── Helpers ──
const pad = n => String(n).padStart(2,"0");
const fmtDate = d => { if(!d) return ""; const x=d instanceof Date?d:new Date(d); return x.getFullYear()+"-"+pad(x.getMonth()+1)+"-"+pad(x.getDate()); };
const parseD = s => { const d=new Date(s); d.setHours(0,0,0,0); return d; };
const addD = (d,n) => { const x=new Date(d); x.setDate(x.getDate()+n); return x; };
const diffD = (a,b) => Math.round((parseD(b)-parseD(a))/86400000);
const isWork = d => d.getDay()!==0&&d.getDay()!==6;
const nextWork = d => { let x=new Date(d); while(!isWork(x)) x=addD(x,1); return x; };
const getKW = d => { const t=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate())); t.setUTCDate(t.getUTCDate()+4-(t.getUTCDay()||7)); const y=new Date(Date.UTC(t.getUTCFullYear(),0,1)); return {kw:Math.ceil((((t-y)/86400000)+1)/7),year:t.getUTCFullYear()}; };
const kwKey = (yr,kw) => yr+"-W"+pad(kw);
const mondayOfKW = (yr,kw) => { const j=new Date(yr,0,4),m=new Date(j); m.setDate(j.getDate()-((j.getDay()||7)-1)+(kw-1)*7); m.setHours(0,0,0,0); return m; };
const allKWsOfYear = yr => { const res=[]; for(let kw=1;kw<=53;kw++){ const mon=mondayOfKW(yr,kw); if(mon.getFullYear()>yr&&kw>1) break; if(mon.getFullYear()<yr) continue; res.push({kw,year:yr,key:kwKey(yr,kw),label:"KW"+pad(kw),monday:mon}); } return res; };
const today = new Date(); today.setHours(0,0,0,0);
const CY = today.getFullYear();
const todayKW = getKW(today);
const S_COL = {offen:"#f59e0b","läuft":"#6366f1",fertig:"#22c55e"};
const STATUS_OPTS = ["alle","offen","läuft","fertig"];

function getKap(ma,k){ return (ma.kap&&ma.kap[k])||0; }

function calcZeitgrad(maId, auf) {
  const rel=auf.filter(a=>a.maId===maId&&a.status==="fertig"&&a.vorgabe>0);
  const ss=rel.reduce((s,a)=>s+a.vorgabe,0), si=rel.reduce((s,a)=>s+(a.istZeit||0),0);
  if(!ss||!rel.length) return null;
  return +(si/ss*100).toFixed(1);
}
function findNextCapDay(from,ma) {
  let cur=new Date(from); while(!isWork(cur)) cur=addD(cur,1);
  for(let i=0;i<500;i++){ if(isWork(cur)){ if(getKap(ma,kwKey(getKW(cur).year,getKW(cur).kw))>0) return cur; cur=addD(mondayOfKW(getKW(cur).year,getKW(cur).kw),7); } else cur=addD(cur,1); }
  return cur;
}
function autoSchedule(auftraege, maList) {
  const result=auftraege.map(a=>Object.assign({},a));
  maList.forEach(ma=>{
    const zg=ma.zeitgrad!=null?ma.zeitgrad:100;
    const active=result.filter(a=>a.maId===ma.id&&a.status!=="fertig");
    active.sort((a,b)=>{const da=a.deadline||"9999-12-31",db=b.deadline||"9999-12-31";return da<db?-1:da>db?1:a.id-b.id;});
    let curDay=findNextCapDay(nextWork(today),ma);
    let rem=getKap(ma,kwKey(getKW(curDay).year,getKW(curDay).kw))/5;
    active.forEach(a=>{
      const gh=zg>0?+(a.vorgabe/(zg/100)).toFixed(4):a.vorgabe;
      let remaining=gh,cur=new Date(curDay),curRem=rem;
      a.start=fmtDate(cur); let lastDay=new Date(cur);
      while(remaining>0.0001){
        const kw=getKW(cur),k=kwKey(kw.year,kw.kw),kapW=getKap(ma,k);
        if(!kapW){cur=findNextCapDay(addD(cur,1),ma);const nkw=getKW(cur);curRem=getKap(ma,kwKey(nkw.year,nkw.kw))/5;a.start=a.start||fmtDate(cur);continue;}
        if(curRem<=0){cur=addD(cur,1);while(!isWork(cur))cur=addD(cur,1);const nkw=getKW(cur);if(!getKap(ma,kwKey(nkw.year,nkw.kw)))cur=findNextCapDay(cur,ma);const fkw=getKW(cur);curRem=getKap(ma,kwKey(fkw.year,fkw.kw))/5;continue;}
        const consume=Math.min(remaining,curRem);remaining-=consume;curRem-=consume;lastDay=new Date(cur);
        if(remaining<=0.0001)break;
        if(curRem<=0.0001){cur=addD(cur,1);while(!isWork(cur))cur=addD(cur,1);const nkw=getKW(cur);if(!getKap(ma,kwKey(nkw.year,nkw.kw)))cur=findNextCapDay(cur,ma);const fkw=getKW(cur);curRem=getKap(ma,kwKey(fkw.year,fkw.kw))/5;}
      }
      a.end=fmtDate(lastDay);curDay=new Date(lastDay);rem=curRem<=0.0001?0:curRem;
      const idx=result.findIndex(r=>r.id===a.id);if(idx>=0)result[idx]=a;
    });
  });
  return result;
}

// ── State ──
const initMA=[
  {id:1,name:"Thomas Müller",rolle:"Schlosser",zeitgrad:85,kap:{}},
  {id:2,name:"Anna Schmidt",rolle:"Lackiererin",zeitgrad:92,kap:{}},
  {id:3,name:"Klaus Weber",rolle:"Monteur",zeitgrad:75,kap:{}},
  {id:4,name:"Sara Braun",rolle:"CNC-Fräser",zeitgrad:100,kap:{}},
];
const initRaw=[
  {id:1,nr:"AU-1001",bez:"Stahlrahmen Charge A",maId:1,vorgabe:8,istZeit:0,status:"offen",deadline:fmtDate(addD(today,10))},
  {id:2,nr:"AU-1002",bez:"Schweißnaht Rahmen C",maId:1,vorgabe:10,istZeit:0,status:"offen",deadline:fmtDate(addD(today,20))},
  {id:3,nr:"AU-1003",bez:"Lackierung Türen",maId:2,vorgabe:5,istZeit:4,status:"läuft",deadline:fmtDate(addD(today,5))},
  {id:4,nr:"AU-1004",bez:"Montage Gestell B",maId:3,vorgabe:12,istZeit:13,status:"fertig",deadline:fmtDate(addD(today,-2)),start:fmtDate(addD(today,-10)),end:fmtDate(addD(today,-2))},
  {id:5,nr:"AU-1005",bez:"CNC Fräsung #7",maId:4,vorgabe:6,istZeit:0,status:"offen",deadline:fmtDate(addD(today,8))},
  {id:6,nr:"AU-1006",bez:"Wartung Maschine B",maId:1,vorgabe:4,istZeit:0,status:"offen",deadline:fmtDate(addD(today,6))},
];

let state = {
  tab:"dashboard", search:"", statusFilter:"alle",
  year:CY, kapYear:CY,
  ganttStart:fmtDate(addD(today,-2)), ganttDays:28,
  expanded:{},
  aModal:null, aForm:{},
  maModal:null, maForm:{},
  kapModal:null,
  istModal:null, istVal:"",
  ma: (function(){const maWZG=initMA.map(m=>{const zg=calcZeitgrad(m.id,initRaw);return Object.assign({},m,{zeitgrad:zg!=null?zg:m.zeitgrad});});return maWZG;})(),
  auf: null
};
state.auf = autoSchedule(initRaw, state.ma);

function applyUpdate(nextAuf, nextMA) {
  const maWZG=nextMA.map(m=>{const zg=calcZeitgrad(m.id,nextAuf);return Object.assign({},m,{zeitgrad:zg!=null?zg:m.zeitgrad});});
  state.ma=maWZG; state.auf=autoSchedule(nextAuf,maWZG); render();
}
function setState(patch){ Object.assign(state,patch); render(); }

function geplantH(a,ma){
  const zg=ma?ma.zeitgrad:100;
  if(!a.vorgabe||zg<=0)return 0;
  return +(a.vorgabe/(zg/100)).toFixed(2);
}
function maMap(){ const m={}; state.ma.forEach(x=>{m[x.id]=x;}); return m; }

// ── SVG Chart ──
function svgChart(data) {
  const W=600,H=200,PL=40,PR=40,PT=10,PB=30;
  const cW=W-PL-PR, cH=H-PT-PB;
  const maxH=Math.max(...data.map(d=>Math.max(d.kapazitaet,d.verplant)),1);
  const maxP=Math.max(...data.map(d=>d.auslastung),1);
  const bW=Math.floor(cW/data.length)-2;
  let bars="",lines="",xLabels="",yLabels="";
  data.forEach((d,i)=>{
    const x=PL+i*(cW/data.length)+((cW/data.length)-bW)/2;
    const h1=Math.max(1,(d.kapazitaet/maxH)*cH);
    const h2=Math.max(1,(d.verplant/maxH)*cH);
    bars+=`<rect x="${x}" y="${PT+cH-h1}" width="${bW/2}" height="${h1}" fill="#334155" rx="2"/>`;
    bars+=`<rect x="${x+bW/2}" y="${PT+cH-h2}" width="${bW/2}" height="${h2}" fill="#6366f1" rx="2"/>`;
    if(i%2===0) xLabels+=`<text x="${x+bW/2}" y="${H-5}" text-anchor="middle" fill="#64748b" font-size="9">${d.label}</text>`;
  });
  // Line for Auslastung
  let pts=data.map((d,i)=>{
    const x=PL+i*(cW/data.length)+(cW/data.length)/2;
    const y=PT+cH-(d.auslastung/maxP)*cH;
    return x+","+y;
  }).join(" ");
  lines=`<polyline points="${pts}" fill="none" stroke="#f59e0b" stroke-width="2"/>`;
  data.forEach((d,i)=>{
    const x=PL+i*(cW/data.length)+(cW/data.length)/2;
    const y=PT+cH-(d.auslastung/maxP)*cH;
    lines+=`<circle cx="${x}" cy="${y}" r="3" fill="#f59e0b"/>`;
  });
  // Y labels
  for(let i=0;i<=4;i++){
    const v=Math.round(maxH/4*i);
    const y=PT+cH-(i/4)*cH;
    yLabels+=`<text x="${PL-4}" y="${y+4}" text-anchor="end" fill="#64748b" font-size="9">${v}h</text>`;
    yLabels+=`<line x1="${PL}" y1="${y}" x2="${W-PR}" y2="${y}" stroke="#1e293b" stroke-width="1"/>`;
  }
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:220px">${yLabels}${bars}${lines}${xLabels}
    <text x="${W-PR+5}" y="${PT+10}" fill="#f59e0b" font-size="9">%</text>
  </svg>`;
}

// ── Render ──
function e(tag,attrs,children){
  const el=document.createElement(tag);
  if(attrs) Object.keys(attrs).forEach(k=>{
    if(k==="style"&&typeof attrs[k]==="object"){Object.assign(el.style,attrs[k]);}
    else if(k.startsWith("on")&&typeof attrs[k]==="function"){el.addEventListener(k.slice(2).toLowerCase(),attrs[k]);}
    else if(k==="className"){el.className=attrs[k];}
    else if(k==="htmlFor"){el.htmlFor=attrs[k];}
    else{try{el.setAttribute(k,attrs[k]);}catch(ex){}}
  });
  if(Array.isArray(children)) children.forEach(c=>c&&el.appendChild(typeof c==="string"?document.createTextNode(c):c));
  else if(children!=null) el.appendChild(typeof children==="string"?document.createTextNode(children):children);
  return el;
}
function txt(s){ return document.createTextNode(String(s||"")); }
function div(style,children){ const d=document.createElement("div"); if(style) Object.assign(d.style,style); if(Array.isArray(children)) children.forEach(c=>c&&d.appendChild(typeof c==="string"?document.createTextNode(c):c)); else if(children!=null) d.appendChild(typeof children==="string"?document.createTextNode(children):children); return d; }
function btn(text,color,sm,onClick,outline){
  const b=document.createElement("button");
  b.className="btn"+(sm?" btn-sm":"")+(outline?" btn-outline":"");
  b.style.background=outline?"transparent":color||"#6366f1";
  b.style.border="1px solid "+(color||"#6366f1");
  b.style.color=outline?(color||"#6366f1"):"#fff";
  b.textContent=text; b.onclick=onClick; return b;
}
function inp(label,val,onChange,opts){
  const wrap=document.createElement("div"); wrap.className="form-group";
  if(label){const l=document.createElement("label");l.textContent=label;wrap.appendChild(l);}
  let field;
  if(opts){field=document.createElement("select");opts.forEach(o=>{const op=document.createElement("option");op.value=o.v!=null?o.v:o;op.textContent=o.l!=null?o.l:o;if(String(o.v!=null?o.v:o)===String(val))op.selected=true;field.appendChild(op);});field.onchange=e=>onChange(e.target.value);}
  else{field=document.createElement("input");field.value=val||"";field.oninput=e=>onChange(e.target.value);}
  wrap.appendChild(field); return wrap;
}
function inpType(label,type,val,onChange){
  const wrap=document.createElement("div"); wrap.className="form-group";
  if(label){const l=document.createElement("label");l.textContent=label;wrap.appendChild(l);}
  const field=document.createElement("input"); field.type=type; field.value=val||"";
  field.oninput=e=>onChange(e.target.value); wrap.appendChild(field); return wrap;
}

function modal(title,onClose,wide,content){
  const overlay=div({position:"fixed",inset:0,background:"rgba(0,0,0,.65)",zIndex:100,display:"flex",alignItems:"center",justifyContent:"center"});
  const box=document.createElement("div"); box.className="modal"+(wide?" modal-wide":"");
  const hdr=div({display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"16px"},[
    e("b",{style:{fontSize:"16px"}},title),
    btn("×","#64748b",true,onClose,true)
  ]);
  box.appendChild(hdr); content.forEach(c=>c&&box.appendChild(c));
  overlay.appendChild(box);
  return overlay;
}

function renderApp(){
  const mm=maMap();
  const app=document.getElementById("app");
  app.innerHTML="";

  // Header
  const header=div({background:"#0f172a",borderBottom:"1px solid #1e293b",padding:"16px 24px",display:"flex",alignItems:"center",gap:"12px"},[
    e("span",{style:{fontSize:"24px"}},"🔧"),
    div(null,[
      div({fontWeight:700,fontSize:"18px",color:"#f1f5f9"},"Produktions-Dashboard"),
      div({fontSize:"12px",color:"#64748b"},"Auftragsplanung · Zeitgrad · Auto-Scheduling")
    ]),
    div({marginLeft:"auto",fontSize:"12px",color:"#64748b"},today.toLocaleDateString("de-DE",{weekday:"long",day:"2-digit",month:"long",year:"numeric"}))
  ]);
  app.appendChild(header);

  // Tabs
  const tabBar=div({display:"flex",borderBottom:"1px solid #1e293b",background:"#0f172a",overflowX:"auto",padding:"0 24px"});
  [["dashboard","📊 Dashboard"],["auftraege","📋 Aufträge"],["gantt","📅 Gantt"],["mitarbeiter","👷 Mitarbeiter"],["kapazitaet","🗂 Kapazität"]].forEach(([k,l])=>{
    const t=document.createElement("button"); t.className="tab"+(state.tab===k?" active":"");
    t.textContent=l; t.onclick=()=>{state.tab=k;render();};
    tabBar.appendChild(t);
  });
  app.appendChild(tabBar);

  // Content
  const content=div({padding:"24px",maxWidth:"1400px",margin:"0 auto"});
  app.appendChild(content);

  if(state.tab==="dashboard") renderDashboard(content,mm);
  else if(state.tab==="auftraege") renderAuftraege(content,mm);
  else if(state.tab==="gantt") renderGantt(content,mm);
  else if(state.tab==="mitarbeiter") renderMitarbeiter(content,mm);
  else if(state.tab==="kapazitaet") renderKapazitaet(content,mm);

  renderModals(app,mm);
}

function renderDashboard(content,mm){
  // KPIs
  const kpiGrid=div({display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(160px,1fr))",gap:"16px",marginBottom:"24px"});
  const offen=state.auf.filter(a=>a.status==="offen").length;
  const laeuft=state.auf.filter(a=>a.status==="läuft").length;
  const fertig=state.auf.filter(a=>a.status==="fertig").length;
  const fertigMA=state.ma.filter(m=>calcZeitgrad(m.id,state.auf)!==null);
  const avgZG=fertigMA.length?(state.ma.map(m=>calcZeitgrad(m.id,state.auf)||0).reduce((s,v)=>s+v,0)/fertigMA.length).toFixed(1):"–";
  [{l:"Offen",v:offen,i:"📋",c:"#f59e0b"},{l:"In Bearbeitung",v:laeuft,i:"⚙️",c:"#6366f1"},{l:"Fertiggestellt",v:fertig,i:"✅",c:"#22c55e"},{l:"Ø Zeitgrad",v:avgZG+(avgZG!=="–"?"%":""),i:"⏱️",c:"#e879f9"}].forEach(kpi=>{
    const card=div({background:"#1e293b",borderRadius:"12px",padding:"20px",border:"1px solid "+kpi.c+"33"},[
      div({fontSize:"24px",marginBottom:"8px"},kpi.i),
      div({fontSize:"28px",fontWeight:700,color:kpi.c},String(kpi.v)),
      div({fontSize:"12px",color:"#64748b",marginTop:"4px"},kpi.l)
    ]);
    kpiGrid.appendChild(card);
  });
  content.appendChild(kpiGrid);

  // Chart
  const chartCard=div({background:"#1e293b",borderRadius:"12px",padding:"20px",marginBottom:"24px",border:"1px solid #334155"});
  chartCard.appendChild(div({fontWeight:700,marginBottom:"4px"},"📅 Kapazität & Auslastung"));
  chartCard.appendChild(div({fontSize:"12px",color:"#64748b",marginBottom:"12px"},"Kapazität vs. Verplant + Auslastung %"));
  // Build chart data
  const dashKWs=[];
  const vpKW={};
  state.auf.filter(a=>a.start&&a.end).forEach(a=>{
    const zg=(mm[a.maId]&&mm[a.maId].zeitgrad)||100;
    const gh=geplantH(a,mm[a.maId]);
    const ds=Math.max(1,diffD(a.start,a.end)+1); const hpd=gh/ds;
    let cur=parseD(a.start),end=parseD(a.end);
    while(cur<=end){if(isWork(cur)){const kw=getKW(cur);const k=kwKey(kw.year,kw.kw);vpKW[k]=(vpKW[k]||0)+hpd;}cur=addD(cur,1);}
  });
  for(let i=-1;i<=10;i++){
    let kw=todayKW.kw+i,yr=todayKW.year;
    if(kw<1){kw+=52;yr--;} if(kw>52){kw-=52;yr++;}
    const k=kwKey(yr,kw);
    const kapGes=state.ma.reduce((s,m)=>s+getKap(m,k),0);
    const verp=vpKW[k]||0;
    const ausl=kapGes>0?Math.round(verp/kapGes*100):0;
    dashKWs.push({label:"KW"+pad(kw),kapazitaet:+kapGes.toFixed(1),verplant:+verp.toFixed(1),auslastung:ausl});
  }
  // Legend
  const legend=div({display:"flex",gap:"16px",marginBottom:"8px",fontSize:"12px",flexWrap:"wrap"},[
    div({color:"#334155"},"■ Kapazität"),div({color:"#6366f1"},"■ Verplant"),div({color:"#f59e0b"},"— Auslastung %")
  ]);
  chartCard.appendChild(legend);
  const svgWrap=document.createElement("div");
  svgWrap.innerHTML=svgChart(dashKWs);
  chartCard.appendChild(svgWrap);
  content.appendChild(chartCard);

  // Scheduling & Warnings
  const row=div({display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(280px,1fr))",gap:"16px"});
  const schedCard=div({background:"#1e293b",borderRadius:"12px",padding:"20px",border:"1px solid #334155"});
  schedCard.appendChild(div({fontWeight:600,marginBottom:"12px"},"🤖 Auto-Scheduling – Reihenfolge"));
  state.ma.forEach(m=>{
    const mAuf=state.auf.filter(a=>a.maId===m.id&&a.status!=="fertig").sort((a,b)=>(a.start||"").localeCompare(b.start||""));
    const zg=calcZeitgrad(m.id,state.auf);
    const sec=div({marginBottom:"12px",paddingBottom:"12px",borderBottom:"1px solid #0f172a"});
    sec.appendChild(div({fontWeight:600,fontSize:"13px",marginBottom:"4px"},m.name+" (ZG: "+(zg!=null?zg.toFixed(1)+"%":"–")+")"));
    if(!mAuf.length) sec.appendChild(div({fontSize:"12px",color:"#475569"},"– keine aktiven Aufträge"));
    else mAuf.forEach((a,i)=>sec.appendChild(div({fontSize:"12px",color:"#94a3b8",padding:"2px 0"},(i+1)+". "+a.nr+" ("+(a.start||"?")+"→"+(a.end||"?")+") ")));
    schedCard.appendChild(sec);
  });
  row.appendChild(schedCard);

      inp2.value=val; inp2.placeholder="h";
      inp2.style.cssText="width:52px;background:#1e293b;border:1px solid #334155;border-radius:5px;padding:3px 5px;color:#f1f5f9;font-size:12px;text-align:center;display:block;margin:0 auto;";
      inp2.oninput=ev=>{const nextMA=state.ma.map(x=>x.id===m.id?Object.assign({},x,{kap:Object.assign({},x.kap,{[w.key]:parseFloat(ev.target.value)||0})}):x);applyUpdate(state.auf,nextMA);};
      td.appendChild(inp2);
      if(kapVal>0){const lbl=document.createElement("div");lbl.style.cssText="font-size:9px;color:"+pc+";margin-top:1px;";lbl.textContent=verpMA+"h"+(pct!=null?" ("+pct+"%)":"");td.appendChild(lbl);}
      tr.appendChild(td);
    });
    const tdKap=document.createElement("td"); tdKap.style.cssText="padding:6px 10px;text-align:center;"; tdKap.textContent=kapGes>0?kapGes+"h":"–"; tr.appendChild(tdKap);
    const tdV=document.createElement("td"); tdV.style.cssText="padding:6px 10px;text-align:center;color:#94a3b8;"; tdV.textContent=verp>0?verp.toFixed(1)+"h":"–"; tr.appendChild(tdV);
    const tdA=document.createElement("td"); tdA.style.cssText="padding:6px 10px;text-align:center;color:"+ac+";font-weight:600;"; tdA.textContent=ausl!=null?ausl+"%":"–"; tr.appendChild(tdA);
    tbody.appendChild(tr);
  });
  table.appendChild(tbody);
  scroll.appendChild(table); content.appendChild(scroll);
}

function renderModals(app,mm){
  // Auftrag modal
  if(state.aModal){
    const f=state.aForm;
    const m=mm[+f.maId];
    const fp=m&&f.vorgabe?+(parseFloat(f.vorgabe)/(m.zeitgrad/100)).toFixed(2):0;
    const fields=[
      inp("Auftragsnummer",f.nr||"",v=>{state.aForm.nr=v;render();}),
      inp("Bezeichnung",f.bez||"",v=>{state.aForm.bez=v;render();}),
      inp("Mitarbeiter",f.maId||"",v=>{state.aForm.maId=+v;render();},state.ma.map(m=>({v:m.id,l:m.name+" (ZG: "+m.zeitgrad.toFixed(1)+"%)"})) ),
      inp("Status",f.status||"offen",v=>{state.aForm.status=v;render();},["offen","läuft","fertig"]),
      inpType("Vorgabe (h)","number",f.vorgabe||"",v=>{state.aForm.vorgabe=v;render();}),
    ];
    if(fp) fields.push(div({background:"#0f172a",borderRadius:"6px",padding:"8px",fontSize:"12px",color:"#94a3b8",marginBottom:"10px"},"📐 Geplant: "+fp+"h"));
    fields.push(inpType("Deadline","date",f.deadline||"",v=>{state.aForm.deadline=v;render();}));
    fields.push(inpType("Ist-Zeit (h)","number",String(f.istZeit||0),v=>{state.aForm.istZeit=+v;render();}));
    fields.push(div({display:"flex",gap:"8px",marginTop:"8px"},[
      btn("💾 Speichern","#6366f1",false,()=>{
        if(!f.nr||!f.bez||!f.maId||!f.vorgabe)return;
        const obj=Object.assign({},f,{maId:+f.maId,vorgabe:+f.vorgabe,istZeit:+(f.istZeit||0)});
        const next=state.aModal==="edit"?state.auf.map(a=>a.id===obj.id?obj:a):[...state.auf,Object.assign({},obj,{id:Date.now()})];
        applyUpdate(next,state.ma);state.aModal=null;render();
      }),
      btn("Abbrechen","#64748b",false,()=>{state.aModal=null;render();},true)
    ]));
    app.appendChild(modal(state.aModal==="edit"?"Auftrag bearbeiten":"Neuer Auftrag",()=>{state.aModal=null;render();},true,fields));
  }

  // Ist-Zeit modal
  if(state.istModal){
    const a=state.istModal;
    const fields=[
      div({fontWeight:600,marginBottom:"4px"},a.bez),
      div({fontSize:"12px",color:"#64748b",marginBottom:"12px"},"Vorgabe: "+a.vorgabe+"h"),
      inpType("Ist-Zeit (h)","number",state.istVal,v=>{state.istVal=v;render();}),
      div({display:"flex",gap:"8px"},[
        btn("✓ Speichern","#6366f1",false,()=>{
          const v=parseFloat(state.istVal);if(isNaN(v))return;
          const next=state.auf.map(x=>x.id===a.id?Object.assign({},x,{istZeit:v}):x);
          applyUpdate(next,state.ma);state.istModal=null;render();
        }),
        btn("Abbrechen","#64748b",false,()=>{state.istModal=null;render();},true)
      ])
    ];
    app.appendChild(modal("Ist-Zeit eintragen",()=>{state.istModal=null;render();},false,fields));
  }

  // MA modal
  if(state.maModal){
    const f=state.maForm;
    const fields=[
      inp("Name",f.name||"",v=>{state.maForm.name=v;render();}),
      inp("Rolle",f.rolle||"",v=>{state.maForm.rolle=v;render();}),
      div({fontSize:"12px",color:"#64748b",marginBottom:"12px"},"💡 Zeitgrad wird automatisch berechnet."),
      div({display:"flex",gap:"8px"},[
        btn("💾 Speichern","#6366f1",false,()=>{
          if(!f.name)return;
          const obj=Object.assign({},f,{kap:f.kap||{}});
          const nextMA=f.id?state.ma.map(x=>x.id===f.id?obj:x):[...state.ma,Object.assign({},obj,{id:Date.now(),zeitgrad:100,kap:{}})];
          applyUpdate(state.auf,nextMA);state.maModal=null;render();
        }),
        btn("Abbrechen","#64748b",false,()=>{state.maModal=null;render();},true)
      ])
    ];
    app.appendChild(modal(state.maModal==="edit"?"Mitarbeiter bearbeiten":"Neuer Mitarbeiter",()=>{state.maModal=null;render();},false,fields));
  }

  // Kap modal
  if(state.kapModal){
    const mObj=state.ma.find(x=>x.id===state.kapModal.id);
    const kwList=allKWsOfYear(state.kapYear);
    const fields=[
      div({display:"flex",gap:"8px",alignItems:"center",marginBottom:"16px"},[
        btn("◀ "+(state.kapYear-1),"#6366f1",true,()=>{state.kapYear--;render();}),
        div({fontWeight:700,minWidth:"50px",textAlign:"center"},String(state.kapYear)),
        btn((state.kapYear+1)+" ▶","#6366f1",true,()=>{state.kapYear++;render();}),
        div({fontSize:"12px",color:"#64748b"},"h/Woche")
      ]),
    ];
    const grid=div({display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(120px,1fr))",gap:"8px",maxHeight:"400px",overflowY:"auto"});
    kwList.forEach(w=>{
      const isCur=w.kw===todayKW.kw&&w.year===todayKW.year;
      const val=mObj&&getKap(mObj,w.key)||"";
      const cell=div({background:isCur?"#6366f122":"#0f172a",borderRadius:"8px",padding:"8px",border:isCur?"1px solid #6366f1":"1px solid #1e293b"});
      cell.appendChild(div({fontSize:"11px",color:isCur?"#6366f1":"#64748b",marginBottom:"4px"},w.label));
      const ki=document.createElement("input"); ki.type="number"; ki.min=0; ki.max=60; ki.value=val; ki.placeholder="h";
      ki.style.cssText="width:100%;background:#1e293b;border:1px solid #334155;border-radius:5px;padding:4px 6px;color:#f1f5f9;font-size:12px;";
      ki.oninput=ev=>{const nextMA=state.ma.map(m=>m.id===state.kapModal.id?Object.assign({},m,{kap:Object.assign({},m.kap,{[w.key]:parseFloat(ev.target.value)||0})}):m);applyUpdate(state.auf,nextMA);};
      cell.appendChild(ki); grid.appendChild(cell);
    });
    fields.push(grid);
    fields.push(div({marginTop:"16px"},btn("✓ Fertig","#6366f1",false,()=>{state.kapModal=null;render();})));
    app.appendChild(modal("Kapazität: "+(mObj&&mObj.name),()=>{state.kapModal=null;render();},true,fields));
  }
}

function render(){ renderApp(); }
render();
</script>
</body>

<script>
(function(){
'use strict';

// ── Helpers ──
function pad(n){ return String(n).padStart(2,'0'); }
function fmtDate(d){ if(!d) return ''; var x=d instanceof Date?d:new Date(d); return x.getFullYear()+'-'+pad(x.getMonth()+1)+'-'+pad(x.getDate()); }
function fmtD(s){ if(!s) return '–'; var x=new Date(s); x.setHours(0,0,0,0); return pad(x.getDate())+'.'+pad(x.getMonth()+1)+'.'+x.getFullYear(); }
function parseD(s){ var d=new Date(s); d.setHours(0,0,0,0); return d; }
function addD(d,n){ var x=new Date(d); x.setDate(x.getDate()+n); return x; }
function diffD(a,b){ return Math.round((parseD(b)-parseD(a))/86400000); }
function isWork(d){ return d.getDay()!==0&&d.getDay()!==6; }
function nextWork(d){ var x=new Date(d); while(!isWork(x)) x=addD(x,1); return x; }
function getKW(d){
  var t=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
  t.setUTCDate(t.getUTCDate()+4-(t.getUTCDay()||7));
  var y=new Date(Date.UTC(t.getUTCFullYear(),0,1));
  return {kw:Math.ceil((((t-y)/86400000)+1)/7),year:t.getUTCFullYear()};
}
function kwKey(yr,kw){ return yr+'-W'+pad(kw); }
function mondayOfKW(yr,kw){
  var j=new Date(yr,0,4),m=new Date(j);
  m.setDate(j.getDate()-((j.getDay()||7)-1)+(kw-1)*7);
  m.setHours(0,0,0,0); return m;
}
function allKWsOfYear(yr){
  var res=[];
  for(var kw=1;kw<=53;kw++){
    var mon=mondayOfKW(yr,kw);
    if(mon.getFullYear()>yr&&kw>1) break;
    if(mon.getFullYear()<yr) continue;
    res.push({kw:kw,year:yr,key:kwKey(yr,kw),label:'KW'+pad(kw),monday:mon});
  }
  return res;
}
function getKap(ma,k){ return (ma.kap&&ma.kap[k])||0; }

var today=new Date(); today.setHours(0,0,0,0);
var CY=today.getFullYear();
var todayKW=getKW(today);
var S_COL={offen:'#f59e0b','läuft':'#6366f1',fertig:'#22c55e'};

// ── localStorage ──
function lsSave(key,val){ try{ localStorage.setItem(key,JSON.stringify(val)); }catch(e){} }
function lsLoad(key,fallback){ try{ var s=localStorage.getItem(key); return s?JSON.parse(s):fallback; }catch(e){ return fallback; } }

// ── Business Logic ──
function calcZeitgrad(maId,auf){
  var rel=auf.filter(function(a){return a.maId===maId&&a.status==='fertig'&&a.vorgabe>0;});
  var ss=rel.reduce(function(s,a){return s+a.vorgabe;},0);
  var si=rel.reduce(function(s,a){return s+(a.istZeit||0);},0);
  if(!ss||!rel.length) return null;
  return +(si/ss*100).toFixed(1);
}
function geplantH(a,m){
  var zg=m?m.zeitgrad:100;
  if(!a.vorgabe||zg<=0) return 0;
  return +((a.vorgabe*zg)/100).toFixed(2);
}
function autoSchedule(auftraege,maList){
  var result=auftraege.map(function(a){return Object.assign({},a);});
  maList.forEach(function(ma){
    var zg=ma.zeitgrad!=null?ma.zeitgrad:100;
    var active=result.filter(function(a){return a.maId===ma.id&&a.status!=='fertig';});
    active.sort(function(a,b){
      var da=a.deadline||'9999-12-31',db=b.deadline||'9999-12-31';
      return da<db?-1:da>db?1:a.id-b.id;
    });
    var kapEntries=Object.keys(ma.kap||{});
    var hasAnyCap=false;
    for(var ki=0;ki<kapEntries.length;ki++){
      if(ma.kap[kapEntries[ki]]>0){hasAnyCap=true;break;}
    }
    if(!hasAnyCap){
      var cursor=nextWork(today);
      active.forEach(function(a){
        if(!a.start) a.start=fmtDate(cursor);
        var gh=geplantH(a,ma);
        if(!a.end) a.end=fmtDate(addD(cursor,Math.ceil(gh)||1));
        var idx=result.findIndex(function(r){return r.id===a.id;});
        if(idx>=0) result[idx]=a;
      });
      return;
    }
    var curDay=nextWork(today);
    for(var wi=0;wi<100;wi++){
      var kw0=getKW(curDay);
      if(getKap(ma,kwKey(kw0.year,kw0.kw))>0) break;
      curDay=addD(mondayOfKW(kw0.year,kw0.kw),7);
      while(!isWork(curDay)) curDay=addD(curDay,1);
    }
    var ckw=getKW(curDay);
    var remToday=getKap(ma,kwKey(ckw.year,ckw.kw))/5;
    active.forEach(function(a){
      var gh=zg>0?+(a.vorgabe/(zg/100)).toFixed(4):a.vorgabe;
      var rem=gh,cur=new Date(curDay),curRem=remToday,lastDay=new Date(curDay),safety=0;
      a.start=fmtDate(cur);
      while(rem>0.0001&&safety<2000){
        safety++;
        var kw=getKW(cur),k=kwKey(kw.year,kw.kw),kapW=getKap(ma,k);
        if(!kapW){
          cur=addD(mondayOfKW(kw.year,kw.kw),7);
          while(!isWork(cur)) cur=addD(cur,1);
          var nkw=getKW(cur); curRem=getKap(ma,kwKey(nkw.year,nkw.kw))/5;
          continue;
        }
        if(curRem<=0){
          cur=addD(cur,1); while(!isWork(cur)) cur=addD(cur,1);
          var kw2=getKW(cur),k2=kwKey(kw2.year,kw2.kw);
          if(!getKap(ma,k2)){cur=addD(mondayOfKW(kw2.year,kw2.kw),7);while(!isWork(cur))cur=addD(cur,1);}
          var kw3=getKW(cur); curRem=getKap(ma,kwKey(kw3.year,kw3.kw))/5;
          continue;
        }
        var consume=Math.min(rem,curRem);
        rem-=consume; curRem-=consume; lastDay=new Date(cur);
        if(rem<=0.0001) break;
        if(curRem<=0.0001){
          cur=addD(cur,1); while(!isWork(cur)) cur=addD(cur,1);
          var kw4=getKW(cur),k4=kwKey(kw4.year,kw4.kw);
          if(!getKap(ma,k4)){cur=addD(mondayOfKW(kw4.year,kw4.kw),7);while(!isWork(cur))cur=addD(cur,1);}
          var kw5=getKW(cur); curRem=getKap(ma,kwKey(kw5.year,kw5.kw))/5;
        }
      }
      a.end=fmtDate(lastDay);
      curDay=new Date(lastDay); remToday=curRem<=0.0001?0:curRem;
      var idx=result.findIndex(function(r){return r.id===a.id;});
      if(idx>=0) result[idx]=a;
    });
  });
  return result;
}

// ── Init Data ──
var initMA=[

  {id:2,name:'Anna Schmidt',rolle:'Lackiererin',zeitgrad:92,kap:{}},

];
var initRaw=[
  {id:1,nr:'AU-1001',bez:'Stahlrahmen Charge A',maId:1,vorgabe:8,istZeit:0,status:'offen',deadline:fmtDate(addD(today,10))},
  {id:2,nr:'AU-1002',bez:'Schweißnaht Rahmen C',maId:1,vorgabe:10,istZeit:0,status:'offen',deadline:fmtDate(addD(today,20))},
  {id:3,nr:'AU-1003',bez:'Lackierung Türen',maId:2,vorgabe:5,istZeit:4,status:'läuft',deadline:fmtDate(addD(today,5))},
  {id:4,nr:'AU-1004',bez:'Montage Gestell B',maId:3,vorgabe:12,istZeit:13,status:'fertig',deadline:fmtDate(addD(today,-2)),start:fmtDate(addD(today,-10)),end:fmtDate(addD(today,-2))},
  {id:5,nr:'AU-1005',bez:'CNC Fräsung #7',maId:4,vorgabe:6,istZeit:0,status:'offen',deadline:fmtDate(addD(today,8))},
  {id:6,nr:'AU-1006',bez:'Wartung Maschine B',maId:1,vorgabe:4,istZeit:0,status:'offen',deadline:fmtDate(addD(today,6))}
];

// Load from localStorage or use defaults
var savedMA=lsLoad('prod_ma',null);
var savedAuf=lsLoad('prod_auf',null);
var initMAWZG, initAuf;
if(savedMA&&savedAuf){
  initMAWZG=savedMA;
  initAuf=savedAuf;
} else {
  initMAWZG=initMA.map(function(m){var zg=calcZeitgrad(m.id,initRaw);return Object.assign({},m,{zeitgrad:zg!=null?zg:m.zeitgrad});});
  initAuf=autoSchedule(initRaw,initMAWZG);
}

// ── State ──
var ST={
  tab:'dashboard',search:'',statusFilter:'alle',
  year:CY,kapYear:CY,dashOffset:0,
  ganttStart:fmtDate(addD(today,-2)),ganttDays:28,expanded:{},
  aModal:null,aForm:{},maModal:null,maForm:{},kapModal:null,istModal:null,istVal:'',
  ma:initMAWZG,auf:initAuf
};
function getMM(){var m={};ST.ma.forEach(function(x){m[x.id]=x;});return m;}
function applyUpdate(nextAuf,nextMA){
  var maWZG=nextMA.map(function(m){var zg=calcZeitgrad(m.id,nextAuf);return Object.assign({},m,{zeitgrad:zg!=null?zg:m.zeitgrad});});
  ST.ma=maWZG;
  ST.auf=autoSchedule(nextAuf,maWZG);
  // Persist to localStorage
  lsSave('prod_ma',ST.ma);
  lsSave('prod_auf',ST.auf);
  render();
}

// ── DOM Helpers ──
function mk(tag,css,ch){
  var el=document.createElement(tag);
  if(css) Object.assign(el.style,css);
  if(ch==null) return el;
  var arr=Array.isArray(ch)?ch:[ch];
  arr.forEach(function(c){
    if(c==null||c===false||c===undefined) return;
    if(typeof c==='string'||typeof c==='number') el.appendChild(document.createTextNode(String(c)));
    else el.appendChild(c);
  });
  return el;
}
function D(css,ch){ return mk('div',css,ch); }
function SP(css,txt){ var s=document.createElement('span'); if(css) Object.assign(s.style,css); if(txt!=null) s.textContent=String(txt); return s; }
function BTN(txt,color,sm,fn,outline){
  var c=color||'#6366f1';
  var b=document.createElement('button');
  b.style.cssText='padding:'+(sm?'5px 10px':'8px 16px')+';background:'+(outline?'transparent':c)+';border:1px solid '+c+';border-radius:7px;color:'+(outline?c:'#fff')+';font-size:'+(sm?12:13)+'px;font-weight:600;cursor:pointer;white-space:nowrap;';
  b.textContent=txt; if(fn) b.onclick=fn; return b;
}

// ── FG: input helper – uses onblur+onchange, NOT oninput, to avoid focus loss ──
function FG(label,val,fn,opts){
  var w=document.createElement('div'); w.className='fg';
  if(label){var lb=document.createElement('label');lb.textContent=label;w.appendChild(lb);}
  var f;
  if(opts){
    f=document.createElement('select');
    opts.forEach(function(o){var op=document.createElement('option');op.value=String(o.v!=null?o.v:o);op.textContent=String(o.l!=null?o.l:o);if(String(o.v!=null?o.v:o)===String(val))op.selected=true;f.appendChild(op);});
    // select: trigger immediately on change (no focus issue)
    f.onchange=function(ev){fn(ev.target.value);};
  } else {
    f=document.createElement('input');
    f.value=val!=null?String(val):'';
    // KEY FIX: use onblur instead of oninput so focus is never lost while typing
    f.onblur=function(ev){fn(ev.target.value);};
    // Also update on Enter key
    f.onkeydown=function(ev){if(ev.key==='Enter'){fn(ev.target.value);}};
  }
  w.appendChild(f); return w;
}
function FGT(label,type,val,fn){
  var w=document.createElement('div'); w.className='fg';
  if(label){var lb=document.createElement('label');lb.textContent=label;w.appendChild(lb);}
  var f=document.createElement('input');
  f.type=type;
  f.value=val!=null?String(val):'';
  // KEY FIX: onblur + Enter, never oninput
  f.onblur=function(ev){fn(ev.target.value);};
  f.onkeydown=function(ev){if(ev.key==='Enter'){fn(ev.target.value);}};
  w.appendChild(f); return w;
}

function MODAL(title,closeFn,wide,parts){
  var ov=D({position:'fixed',top:'0',right:'0',bottom:'0',left:'0',background:'rgba(0,0,0,.7)',zIndex:'100',display:'flex',alignItems:'center',justifyContent:'center'});
  var box=D({background:'#1e293b',borderRadius:'12px',padding:'24px',width:wide?'90vw':'420px',maxWidth:'95vw',maxHeight:'90vh',overflowY:'auto',border:'1px solid #334155'});
  var hdr=D({display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'16px'});
  var ttl=document.createElement('b'); ttl.style.fontSize='16px'; ttl.textContent=title; hdr.appendChild(ttl);
  hdr.appendChild(BTN('×','#a8b8cc',true,closeFn,true));
  box.appendChild(hdr);
  parts.forEach(function(p){if(p) box.appendChild(p);});
  ov.appendChild(box); return ov;
}
function PROG(pct,color){
  var bg=D({background:'#0f172a',borderRadius:'99px',height:'6px'});
  bg.appendChild(D({width:Math.min(pct,100)+'%',background:color||'#6366f1',height:'100%',borderRadius:'99px'}));
  return bg;
}

// ── Chart: Kapazität & Verplant (Balken) ──
function buildBarChart(data,curIdx){
  if(curIdx===undefined) curIdx=-1;
  var W=900,H=260,PL=42,PR=16,PT=12,PB=28,cW=W-PL-PR,cH=H-PT-PB;
  var maxH=1;
  data.forEach(function(d){if(d.kapazitaet>maxH)maxH=d.kapazitaet;if(d.verplant>maxH)maxH=d.verplant;});
  var p=['<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;max-height:280px;display:block">'];
  // Gridlines
  for(var gi=0;gi<=4;gi++){
    var gy=PT+cH-(gi/4)*cH;
    p.push('<line x1="'+PL+'" y1="'+gy+'" x2="'+(W-PR)+'" y2="'+gy+'" stroke="#334155" stroke-width="1"/>');
    p.push('<text x="'+(PL-6)+'" y="'+(gy+4)+'" text-anchor="end" fill="#cbd5e1" font-size="11" font-weight="500">'+Math.round(maxH/4*gi)+'h</text>');
  }
  var bW=Math.max(8,Math.floor(cW/data.length)-6);
  data.forEach(function(d,i){
    var x=PL+i*(cW/data.length)+((cW/data.length)-bW)/2;
    var h1=Math.max(2,(d.kapazitaet/maxH)*cH);
    var h2=Math.max(2,(d.verplant/maxH)*cH);
    var isCur=i===curIdx;
    p.push('<rect x="'+x+'" y="'+(PT+cH-h1)+'" width="'+(bW/2-1)+'" height="'+h1+'" fill="'+(isCur?'#fb923c':'#f97316')+'" rx="2"/>');
    p.push('<rect x="'+(x+bW/2)+'" y="'+(PT+cH-h2)+'" width="'+(bW/2-1)+'" height="'+h2+'" fill="'+(isCur?'#818cf8':'#6366f1')+'" rx="2"/>');
    // Value labels on top of bars
    if(d.kapazitaet>0) p.push('<text x="'+(x+bW/4)+'" y="'+(PT+cH-h1-4)+'" text-anchor="middle" fill="#fed7aa" font-size="9">'+d.kapazitaet+'</text>');
    if(d.verplant>0)   p.push('<text x="'+(x+bW*3/4)+'" y="'+(PT+cH-h2-4)+'" text-anchor="middle" fill="#a5b4fc" font-size="9">'+d.verplant+'</text>');
    // KW label
    p.push('<text x="'+(x+bW/2)+'" y="'+(H-6)+'" text-anchor="middle" fill="'+(isCur?'#e2e8f0':'#cbd5e1')+'" font-size="'+(isCur?11:10)+'" font-weight="'+(isCur?'700':'400')+'">'+d.label+'</text>');
  });
  p.push('</svg>'); return p.join('');
}

// ── Chart: Auslastung % (Linie) ──
function buildLineChart(data,curIdx){
  if(curIdx===undefined) curIdx=-1;
  var W=900,H=260,PL=42,PR=36,PT=12,PB=28,cW=W-PL-PR,cH=H-PT-PB;
  var maxP=120;
  var p=['<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;max-height:280px;display:block">'];
  // Gridlines
  [0,25,50,75,100].forEach(function(v){
    var gy=PT+cH-(v/maxP)*cH;
    var isHundred=v===100;
    p.push('<line x1="'+PL+'" y1="'+gy+'" x2="'+(W-PR)+'" y2="'+gy+'" stroke="'+(isHundred?'#ef4444':'#334155')+'" stroke-width="'+(isHundred?2:1)+'" stroke-dasharray="'+(isHundred?'6,4':'0')+'"/>');
    p.push('<text x="'+(PL-6)+'" y="'+(gy+4)+'" text-anchor="end" fill="'+(isHundred?'#fca5a5':'#cbd5e1')+'" font-size="11" font-weight="'+(isHundred?'700':'500')+'">'+v+'%</text>');
  });
  // 100% right label
  var y100=PT+cH-(100/maxP)*cH;
  p.push('<text x="'+(W-PR+4)+'" y="'+(y100+4)+'" fill="#fca5a5" font-size="10" font-weight="700">100%</text>');
  // KW labels
  data.forEach(function(d,i){
    var x=PL+i*(cW/data.length)+(cW/data.length)/2;
    var isCur=i===1;
    p.push('<text x="'+x+'" y="'+(H-6)+'" text-anchor="middle" fill="'+(isCur?'#e2e8f0':'#cbd5e1')+'" font-size="'+(isCur?11:10)+'" font-weight="'+(isCur?'700':'400')+'">'+d.label+'</text>');
  });
  // Filled area
  var apts=data.map(function(d,i){
    var x=PL+i*(cW/data.length)+(cW/data.length)/2;
    var y=PT+cH-(Math.min(d.auslastung,maxP)/maxP)*cH;
    return x+','+y;
  });
  var firstX=PL+(cW/data.length)/2, lastX=PL+(data.length-1)*(cW/data.length)+(cW/data.length)/2;
  p.push('<polygon points="'+firstX+','+(PT+cH)+' '+apts.join(' ')+' '+lastX+','+(PT+cH)+'" fill="#f59e0b22"/>');
  // Line
  p.push('<polyline points="'+apts.join(' ')+'" fill="none" stroke="#fbbf24" stroke-width="2.5"/>');
  // Dots + value labels
  data.forEach(function(d,i){
    var x=PL+i*(cW/data.length)+(cW/data.length)/2;
    var y=PT+cH-(Math.min(d.auslastung,maxP)/maxP)*cH;
    var dc=d.auslastung>100?'#f87171':d.auslastung>80?'#fbbf24':'#4ade80';
    var isCur=i===curIdx;
    p.push('<circle cx="'+x+'" cy="'+y+'" r="'+(isCur?6:3.5)+'" fill="'+dc+'" stroke="#0f172a" stroke-width="'+(isCur?2:1.5)+'"/>');
    if(d.auslastung>0) p.push('<text x="'+x+'" y="'+(y-10)+'" text-anchor="middle" fill="'+dc+'" font-size="'+(isCur?11:9)+'" font-weight="'+(isCur?'700':'600')+'">'+d.auslastung+'%</text>');
  });
  p.push('</svg>'); return p.join('');
}

// ── Dashboard ──
function tabDashboard(mm){
  var offen=ST.auf.filter(function(a){return a.status==='offen';}).length;
  var laeuft=ST.auf.filter(function(a){return a.status==='läuft';}).length;
  var fertig=ST.auf.filter(function(a){return a.status==='fertig';}).length;
  var fMAs=ST.ma.filter(function(m){return calcZeitgrad(m.id,ST.auf)!==null;});
  var sum0=ST.ma.map(function(m){return calcZeitgrad(m.id,ST.auf)||0;}).reduce(function(s,v){return s+v;},0);
  var avgZG=fMAs.length?(sum0/fMAs.length).toFixed(1):'–';

  // KPI Row
  var kpiRow=D({display:'flex',gap:'16px',marginBottom:'24px',flexWrap:'wrap'});
  [{l:'Offen',v:offen,i:'📋',c:'#f59e0b'},{l:'In Bearbeitung',v:laeuft,i:'⚙️',c:'#6366f1'},{l:'Fertiggestellt',v:fertig,i:'✅',c:'#22c55e'},{l:'Ø Zeitgrad',v:avgZG+(avgZG!=='–'?'%':''),i:'⏱️',c:'#e879f9'}].forEach(function(k){
    kpiRow.appendChild(D({flex:'1',minWidth:'140px',background:'#1e293b',borderRadius:'12px',padding:'20px',border:'1px solid '+k.c+'33'},[D({fontSize:'24px',marginBottom:'8px'},k.i),D({fontSize:'26px',fontWeight:'700',color:k.c},String(k.v)),D({fontSize:'12px',color:'#a8b8cc',marginTop:'4px'},k.l)]));
  });

  // Build vpKW per MA and total
  var vpKW={};
  ST.auf.filter(function(a){return a.start&&a.end;}).forEach(function(a){
    var gh=geplantH(a,mm[a.maId]),ds=Math.max(1,diffD(a.start,a.end)+1),hpd=gh/ds;
    var cur=parseD(a.start),end=parseD(a.end);
    while(cur<=end){
      if(isWork(cur)){
        var kw=getKW(cur),k=kwKey(kw.year,kw.kw);
        if(!vpKW[k]) vpKW[k]={_total:0};
        vpKW[k][a.maId]=(vpKW[k][a.maId]||0)+hpd;
        vpKW[k]._total=(vpKW[k]._total||0)+hpd;
      }
      cur=addD(cur,1);
    }
  });

  // ── Build all KWs of the year ──
  var allKWs=[];
  for(var wyi=1;wyi<=52;wyi++){
    var wk=kwKey(CY,wyi);
    var kapGes2=ST.ma.reduce(function(s,m){return s+getKap(m,wk);},0);
    var verp2=(vpKW[wk]&&vpKW[wk]._total)||0;
    var maData2={};
    ST.ma.forEach(function(m){maData2[m.id]={kap:getKap(m,wk),verp:+((vpKW[wk]&&vpKW[wk][m.id])||0).toFixed(2)};});
    allKWs.push({label:'KW'+pad(wyi),key:wk,kapazitaet:+kapGes2.toFixed(1),verplant:+verp2.toFixed(1),auslastung:kapGes2>0?Math.round(verp2/kapGes2*100):0,maData:maData2});
  }

  var WIN=12; // visible KWs in window
  var maxOff=allKWs.length-WIN;
  // default: show current KW roughly centered, but allow 0
  if(!ST._dashOffsetSet){ST.dashOffset=Math.max(0,Math.min(todayKW.kw-3,maxOff));ST._dashOffsetSet=true;}
  var dashKWs=allKWs.slice(ST.dashOffset, ST.dashOffset+WIN);
  var curIdxInWindow=-1;
  dashKWs.forEach(function(w,i){if(w.key===kwKey(todayKW.year,todayKW.kw))curIdxInWindow=i;});

  // ── Gesamt: zwei separate Charts ──
  var chartsRow=D({display:'flex',flexDirection:'column',gap:'16px',marginBottom:'24px'});

  // Pre-declare chart containers so slider oninput can reference them
  var svgKap=document.createElement('div');
  var svgAusl=document.createElement('div');
  var sliderHdrLabel=document.createElement('span');

  // Slider control
  var sliderWrap=D({background:'#1e293b',borderRadius:'12px',padding:'16px 20px',border:'1px solid #334155'});
  var sliderHdr=D({display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'10px'});
  sliderHdrLabel.style.cssText='font-weight:600;font-size:13px;';
  sliderHdrLabel.textContent='📅 Zeitraum: '+dashKWs[0].label+' – '+dashKWs[dashKWs.length-1].label+' ('+CY+')';
  sliderHdr.appendChild(sliderHdrLabel);
  var todayBtn=document.createElement('button');
  todayBtn.textContent='Heute';
  todayBtn.style.cssText='padding:4px 12px;background:transparent;border:1px solid #6366f1;border-radius:6px;color:#6366f1;font-size:12px;cursor:pointer;font-weight:600;';
  todayBtn.onclick=function(){ST.dashOffset=Math.max(0,Math.min(todayKW.kw-3,maxOff));ST._dashOffsetSet=true;render();};
  sliderHdr.appendChild(todayBtn);
  sliderWrap.appendChild(sliderHdr);

  // KW mini-labels above slider
  var kwLabels=D({display:'flex',justifyContent:'space-between',fontSize:'10px',color:'#cbd5e1',marginBottom:'4px',padding:'0 2px'});
  for(var li=0;li<=maxOff;li+=4){
    var lw=allKWs[li];
    kwLabels.appendChild(SP({color:lw&&lw.key===kwKey(todayKW.year,todayKW.kw)?'#6366f1':'#cbd5e1'},lw?lw.label:''));
  }
  sliderWrap.appendChild(kwLabels);

  var slider=document.createElement('input');
  slider.type='range'; slider.min=0; slider.max=maxOff; slider.value=ST.dashOffset; slider.step=1;
  slider.style.cssText='width:100%;accent-color:#6366f1;cursor:pointer;';
  slider.oninput=function(ev){
    var off=+ev.target.value;
    ST.dashOffset=off;
    ST._dashOffsetSet=true;
    var newDashKWs=allKWs.slice(off, off+WIN);
    var newCurIdx=-1;
    newDashKWs.forEach(function(w,i){if(w.key===kwKey(todayKW.year,todayKW.kw))newCurIdx=i;});
    sliderHdrLabel.textContent='📅 Zeitraum: '+newDashKWs[0].label+' – '+newDashKWs[newDashKWs.length-1].label+' ('+CY+')';
    svgKap.innerHTML=buildBarChart(newDashKWs,newCurIdx);
    svgAusl.innerHTML=buildLineChart(newDashKWs,newCurIdx);
  };
  sliderWrap.appendChild(slider);

  // Week range indicator below slider
  var rangeRow=D({display:'flex',justifyContent:'space-between',fontSize:'11px',color:'#a8b8cc',marginTop:'6px'});
  rangeRow.appendChild(SP(null,'KW01'));
  rangeRow.appendChild(SP({color:'#cbd5e1'},'← ziehen zum Scrollen →'));
  rangeRow.appendChild(SP(null,'KW52'));
  sliderWrap.appendChild(rangeRow);
  chartsRow.appendChild(sliderWrap);

  // Chart 1: Kapazität & Verplant (Balken)
  var kapCard=D({background:'#1e293b',borderRadius:'12px',padding:'20px',border:'1px solid #334155'});
  kapCard.appendChild(D({fontWeight:'700',fontSize:'13px',marginBottom:'2px'},'📦 Kapazität gesamt'));
  kapCard.appendChild(D({fontSize:'11px',color:'#a8b8cc',marginBottom:'8px'},'Verfügbare vs. verplante Stunden pro KW'));
  kapCard.appendChild(D({display:'flex',gap:'14px',fontSize:'11px',marginBottom:'8px'},[SP({color:'#f97316'},'■ Kapazität  '),SP({color:'#6366f1'},'■ Verplant')]));
  svgKap.innerHTML=buildBarChart(dashKWs,curIdxInWindow); kapCard.appendChild(svgKap);
  chartsRow.appendChild(kapCard);

  // Chart 2: Auslastung % (Linie)
  var auslCard=D({background:'#1e293b',borderRadius:'12px',padding:'20px',border:'1px solid #334155'});
  auslCard.appendChild(D({fontWeight:'700',fontSize:'13px',marginBottom:'2px'},'📈 Auslastung gesamt'));
  auslCard.appendChild(D({fontSize:'11px',color:'#a8b8cc',marginBottom:'8px'},'Auslastung in % pro KW (100% = voll ausgelastet)'));
  auslCard.appendChild(D({display:'flex',gap:'14px',fontSize:'11px',marginBottom:'8px'},[SP({color:'#fbbf24'},'— Auslastung %  '),SP({color:'#f87171'},'--- 100% Grenze')]));
  svgAusl.innerHTML=buildLineChart(dashKWs,curIdxInWindow); auslCard.appendChild(svgAusl);
  chartsRow.appendChild(auslCard);

  // Per-MA Section
  var maSection=D({marginBottom:'24px'});
  maSection.appendChild(D({fontWeight:'700',fontSize:'14px',marginBottom:'14px'},'👷 Kapazität & Auslastung pro Mitarbeiter'));
  var maGrid=D({display:'flex',flexWrap:'wrap',gap:'16px'});

  var curKWKey=kwKey(todayKW.year,todayKW.kw);

  ST.ma.forEach(function(m){
    var zg=m.zeitgrad;
    var zgC=zg>=90?'#22c55e':zg>=70?'#6366f1':'#f59e0b';
    var mCard=D({background:'#1e293b',borderRadius:'12px',padding:'16px 18px',border:'1px solid #334155',flex:'1',minWidth:'300px'});

    // Card header
    var mhdr=D({display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'14px'});
    mhdr.appendChild(D(null,[
      D({fontWeight:'700',fontSize:'14px'},m.name),
      D({fontSize:'11px',color:'#a8b8cc',marginTop:'2px'},m.rolle)
    ]));
    var zgBadge=D({textAlign:'right'});
    zgBadge.appendChild(SP({fontSize:'13px',color:zgC,fontWeight:'700'},zg.toFixed(1)+'%'));
    zgBadge.appendChild(D({fontSize:'10px',color:'#cbd5e1'},'Zeitgrad'));
    mhdr.appendChild(zgBadge);
    mCard.appendChild(mhdr);

    // Diese Woche summary
    var curMD=null;
    for(var ci=0;ci<dashKWs.length;ci++){if(dashKWs[ci].key===curKWKey){curMD=dashKWs[ci];break;}}
    if(curMD){
      var cmd=curMD.maData[m.id]||{kap:0,verp:0};
      var cpct=cmd.kap>0?Math.round(cmd.verp/cmd.kap*100):null;
      var cc=cpct==null?'#cbd5e1':cpct>100?'#ef4444':cpct>80?'#f59e0b':'#22c55e';
      var sumRow=D({display:'flex',gap:'10px',marginBottom:'14px'});
      [{l:'Kapazität',v:cmd.kap+'h',c:'#cbd5e1'},{l:'Verplant',v:cmd.verp.toFixed(1)+'h',c:'#6366f1'},{l:'Auslastung',v:cpct!=null?cpct+'%':'–',c:cc}].forEach(function(s){
        sumRow.appendChild(D({flex:'1',background:'#0f172a',borderRadius:'8px',padding:'8px',textAlign:'center'},[
          D({fontSize:'14px',fontWeight:'700',color:s.c},s.v),
          D({fontSize:'10px',color:'#cbd5e1',marginTop:'2px'},s.l)
        ]));
      });
      mCard.appendChild(sumRow);
      // Auslastungsbalken
      if(cpct!=null){
        var barWrap=D({marginBottom:'14px'});
        barWrap.appendChild(D({display:'flex',justifyContent:'space-between',fontSize:'10px',color:'#cbd5e1',marginBottom:'4px'},[D(null,'Auslastung diese Woche'),SP({color:cc},cpct+'%')]));
        var barBg=D({background:'#0f172a',borderRadius:'99px',height:'8px',overflow:'hidden'});
        barBg.appendChild(D({width:Math.min(cpct,100)+'%',height:'100%',background:cc,borderRadius:'99px',transition:'width .4s'}));
        barWrap.appendChild(barBg);
        if(cpct>100) barWrap.appendChild(D({fontSize:'10px',color:'#ef4444',marginTop:'3px'},'⚠️ Überbucht um '+(cpct-100)+'%'));
        mCard.appendChild(barWrap);
      }
    }

    // KW-Tabelle (scrollbar)
    mCard.appendChild(D({fontSize:'11px',color:'#cbd5e1',marginBottom:'6px'},'Nächste 12 Wochen:'));
    var tScroll=D({overflowX:'auto'});
    var tInner=D({display:'flex',gap:'3px',minWidth:'max-content',paddingBottom:'4px'});

    dashKWs.forEach(function(w){
      var md=w.maData[m.id]||{kap:0,verp:0};
      var pct=md.kap>0?Math.round(md.verp/md.kap*100):null;
      var bc=pct==null?'#334155':pct>100?'#ef4444':pct>80?'#f59e0b':'#22c55e';
      var isCur=w.key===curKWKey;
      var col=D({display:'flex',flexDirection:'column',alignItems:'center',gap:'2px',minWidth:'36px'});

      // KW label
      col.appendChild(D({fontSize:'9px',color:isCur?'#6366f1':'#cbd5e1',fontWeight:isCur?'700':'400',textAlign:'center'},w.label.replace('KW','W')));

      // Bar chart cell
      var barH=40;
      var barCell=D({width:'32px',height:barH+'px',background:'#0f172a',borderRadius:'4px',position:'relative',border:'1px solid '+(isCur?'#6366f144':'#1e293b'),overflow:'hidden'});
      // Kapazität (grau, volle Höhe als Referenz)
      var maxKap=0;
      dashKWs.forEach(function(ww){var mk2=ww.maData[m.id];if(mk2&&mk2.kap>maxKap)maxKap=mk2.kap;});
      if(maxKap>0&&md.kap>0){
        var kapFrac=md.kap/maxKap;
        var kapH=Math.round(kapFrac*barH);
        barCell.appendChild(D({position:'absolute',bottom:'0',left:'0',width:'50%',height:kapH+'px',background:'#334155',borderRadius:'2px 0 0 0'}));
        var vFrac=md.kap>0?Math.min(md.verp/md.kap,1.1):0;
        var vH=Math.round(vFrac*kapH);
        barCell.appendChild(D({position:'absolute',bottom:'0',left:'50%',width:'50%',height:vH+'px',background:bc,borderRadius:'0 2px 0 0'}));
      }
      col.appendChild(barCell);

      // Kap value
      col.appendChild(D({fontSize:'9px',color:'#cbd5e1',textAlign:'center'},md.kap>0?md.kap+'h':'–'));
      // Pct
      col.appendChild(D({fontSize:'9px',color:bc,fontWeight:'600',textAlign:'center'},pct!=null?pct+'%':''));

      col.title=m.name+' '+w.label+': '+md.verp.toFixed(1)+'h verpl. / '+md.kap+'h Kap.'+(pct!=null?' = '+pct+'%':'');
      tInner.appendChild(col);
    });

    tScroll.appendChild(tInner);
    mCard.appendChild(tScroll);

    // Legende
    mCard.appendChild(D({display:'flex',gap:'12px',marginTop:'8px',fontSize:'10px',color:'#cbd5e1'},[
      D({display:'flex',alignItems:'center',gap:'4px'},[D({width:'8px',height:'8px',background:'#334155',borderRadius:'2px'}),D(null,'Kapazität')]),
      D({display:'flex',alignItems:'center',gap:'4px'},[D({width:'8px',height:'8px',background:'#6366f1',borderRadius:'2px'}),D(null,'Verplant')])
    ]));

    maGrid.appendChild(mCard);
  });
  maSection.appendChild(maGrid);

  // Scheduling + Warnings
  var schedCard=D({background:'#1e293b',borderRadius:'12px',padding:'20px',border:'1px solid #334155'});
  schedCard.appendChild(D({fontWeight:'600',marginBottom:'12px'},'🤖 Auto-Scheduling'));
  ST.ma.forEach(function(m){
    var mAuf=ST.auf.filter(function(a){return a.maId===m.id&&a.status!=='fertig';}).sort(function(a,b){return (a.start||'').localeCompare(b.start||'');});
    var zg=calcZeitgrad(m.id,ST.auf);
    var zgC=m.zeitgrad>=90?'#22c55e':m.zeitgrad>=70?'#6366f1':'#f59e0b';
    var sec=D({marginBottom:'12px',paddingBottom:'12px',borderBottom:'1px solid #0f172a'});
    var hdr2=D({fontWeight:'600',fontSize:'13px',marginBottom:'4px'});
    hdr2.appendChild(document.createTextNode(m.name+' '));
    hdr2.appendChild(SP({fontSize:'11px',color:zgC},'ZG: '+(zg!=null?zg.toFixed(1)+'%':'–')));
    sec.appendChild(hdr2);
    if(!mAuf.length) sec.appendChild(D({fontSize:'12px',color:'#cbd5e1'},'– keine aktiven Aufträge'));
    else mAuf.forEach(function(a,i){sec.appendChild(D({fontSize:'12px',color:'#cbd5e1',padding:'2px 0'},(i+1)+'. '+a.nr+' ('+fmtD(a.start)+' → '+fmtD(a.end)+')'));});
    schedCard.appendChild(sec);
  });
  var warn=ST.auf.filter(function(a){return a.status!=='fertig'&&a.end&&a.deadline&&a.end>a.deadline;});
  var row2=D({display:'flex',gap:'16px',flexWrap:'wrap'});
  schedCard.style.flex='1'; schedCard.style.minWidth='260px';
  row2.appendChild(schedCard);
  if(warn.length){
    var wCard=D({flex:'1',minWidth:'260px',background:'#1e293b',borderRadius:'12px',padding:'20px',border:'1px solid #ef4444'});
    wCard.appendChild(D({fontWeight:'600',marginBottom:'12px',color:'#ef4444'},'⚠️ Deadline gefährdet'));
    warn.forEach(function(a){wCard.appendChild(D({marginBottom:'10px',padding:'10px',background:'#ef444411',borderRadius:'8px',fontSize:'12px'},[D({fontWeight:'600'},a.nr+' – '+a.bez),D({color:'#cbd5e1'},((mm[a.maId]&&mm[a.maId].name)||'')+' · Ende: '+fmtD(a.end)+' · DL: '+fmtD(a.deadline))]));});
    row2.appendChild(wCard);
  }
  return D(null,[kpiRow,chartsRow,maSection,row2]);
}

// ── Aufträge ──
function tabAuftraege(mm){
  var wrap=D(null);
  var bar=D({display:'flex',gap:'10px',marginBottom:'16px',flexWrap:'wrap',alignItems:'center'});
  var si=document.createElement('input');
  si.placeholder='🔍 Suche...';
  si.value=ST.search||'';
  si.style.cssText='flex:1;min-width:160px;background:#1e293b;border:1px solid #334155;border-radius:8px;padding:8px 12px;color:#f1f5f9;font-size:13px;';
  // KEY FIX: search also uses onblur + Enter to avoid focus loss
  si.onblur=function(ev){ST.search=ev.target.value;render();};
  si.onkeydown=function(ev){if(ev.key==='Enter'){ST.search=ev.target.value;render();}};
  bar.appendChild(si);
  var sbRow=D({display:'flex',gap:'6px',flexWrap:'wrap'});
  ['alle','offen','läuft','fertig'].forEach(function(s){
    var c=s==='alle'?'#6366f1':(S_COL[s]||'#6366f1'),active=ST.statusFilter===s;
    var b=document.createElement('button');
    b.style.cssText='padding:5px 11px;border-radius:7px;border:1px solid '+c+';background:'+(active?c:'transparent')+';color:'+(active?'#fff':c)+';font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;';
    b.textContent=s==='alle'?'Alle':s;
    b.onclick=(function(sv){return function(){ST.statusFilter=sv;render();};})(s);
    sbRow.appendChild(b);
  });
  bar.appendChild(sbRow);
  bar.appendChild(BTN('+ Neuer Auftrag','#6366f1',false,function(){ST.aForm={nr:'',bez:'',maId:ST.ma[0]&&ST.ma[0].id||1,vorgabe:'',istZeit:0,status:'offen',deadline:''};ST.aModal='new';render();}));
  wrap.appendChild(bar);
  var filtered=ST.auf.slice();
  if(ST.statusFilter!=='alle') filtered=filtered.filter(function(a){return a.status===ST.statusFilter;});
  var q=(ST.search||'').toLowerCase().trim();
  if(q) filtered=filtered.filter(function(a){return a.nr.toLowerCase().indexOf(q)>=0||a.bez.toLowerCase().indexOf(q)>=0||((mm[a.maId]&&mm[a.maId].name)||'').toLowerCase().indexOf(q)>=0;});
  wrap.appendChild(D({fontSize:'12px',color:'#a8b8cc',marginBottom:'12px'},filtered.length+' Auftrag'+(filtered.length!==1?'e':'')));
  var grid=D({display:'flex',flexWrap:'wrap',gap:'16px'});
  filtered.forEach(function(a){
    var m=mm[a.maId],zg=(m&&m.zeitgrad)||100,gh=geplantH(a,m);
    var late=a.status!=='fertig'&&a.end&&a.deadline&&a.end>a.deadline;
    var istPct=gh>0?Math.min(((a.istZeit||0)/gh)*100,100):0;
    var aId=a.id;
    var card=D({background:'#1e293b',borderRadius:'12px',padding:'16px',border:'1px solid '+(late?'#ef4444':'#334155'),minWidth:'260px',flex:'1',maxWidth:'400px'});
    var hdr=D({display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'8px'});
    var ti=D(null,[D({fontWeight:'700',fontSize:'14px'},a.nr),D({fontSize:'13px',color:'#cbd5e1'},a.bez)]);
    if(late) ti.appendChild(SP({fontSize:'11px',color:'#ef4444',fontWeight:'600'},' ⚠️ Deadline'));
    hdr.appendChild(ti);
    var sel=document.createElement('select');
    sel.style.cssText='background:'+S_COL[a.status]+'22;border:1px solid '+S_COL[a.status]+';border-radius:6px;color:'+S_COL[a.status]+';padding:3px 6px;font-size:11px;cursor:pointer;';
    ['offen','läuft','fertig'].forEach(function(s){var op=document.createElement('option');op.value=s;op.textContent=s;if(s===a.status)op.selected=true;sel.appendChild(op);});
    sel.onchange=(function(id){return function(ev){var v=ev.target.value;var next=ST.auf.map(function(x){return x.id===id?Object.assign({},x,{status:v}):x;});applyUpdate(next,ST.ma);};})(aId);
    hdr.appendChild(sel); card.appendChild(hdr);
    card.appendChild(D({fontSize:'12px',color:'#a8b8cc',marginBottom:'8px'},[
      D(null,'👷 '+(m&&m.name||'–')+' ('+zg.toFixed(1)+'%)'),
      D(null,'📐 Vorgabe: '+a.vorgabe+'h → Soll: '+gh+'h'),
      D({display:'flex',gap:'16px',marginTop:'2px'},[
        D(null,'🟢 Start: '+fmtD(a.start)),
        D(null,'🔴 Ende: '+fmtD(a.end))
      ]),
      D(null,'🏁 Deadline: '+(a.deadline?fmtD(a.deadline):'keine'))
    ]));
    card.appendChild(D({marginBottom:'10px'},[D({display:'flex',justifyContent:'space-between',fontSize:'11px',color:'#a8b8cc',marginBottom:'3px'},[D(null,'Ist: '+(a.istZeit||0)+'h / '+gh+'h'),SP({color:istPct>=100?'#22c55e':'#cbd5e1'},istPct.toFixed(0)+'%')]),PROG(istPct,istPct>=100?'#22c55e':'#6366f1')]));
    card.appendChild(D({display:'flex',gap:'6px'},[
      BTN('✏️','#6366f1',true,(function(id){return function(){ST.aForm=Object.assign({},ST.auf.filter(function(x){return x.id===id;})[0]);ST.aModal='edit';render();};})(aId)),
      BTN('⏱ Ist','#0ea5e9',true,(function(id){return function(){var found=ST.auf.filter(function(x){return x.id===id;})[0];ST.istModal=found;ST.istVal=String(found.istZeit||0);render();};})(aId)),
      BTN('🗑','#ef4444',true,(function(id){return function(){if(confirm('Auftrag löschen?'))applyUpdate(ST.auf.filter(function(x){return x.id!==id;}),ST.ma);};})(aId))
    ]));
    grid.appendChild(card);
  });
  if(!filtered.length) grid.appendChild(D({color:'#cbd5e1',padding:'24px'},'Keine Aufträge gefunden.'));
  wrap.appendChild(grid); return wrap;
}

// ── Gantt ──
function tabGantt(mm){
  var CW=26,RH=34,LW=170;
  var dayArr=[]; var gd=parseD(ST.ganttStart);
  for(var gi=0;gi<ST.ganttDays;gi++){dayArr.push(new Date(gd));gd=addD(gd,1);}
  var wrap=D(null);
  var ctrl=D({display:'flex',gap:'8px',marginBottom:'16px',alignItems:'center',flexWrap:'wrap'});
  var gt=document.createElement('b'); gt.textContent='Gantt'; ctrl.appendChild(gt);
  ctrl.appendChild(BTN('◀ −1 Wo','#6366f1',true,function(){ST.ganttStart=fmtDate(addD(parseD(ST.ganttStart),-7));render();}));
  ctrl.appendChild(BTN('Heute','#334155',true,function(){ST.ganttStart=fmtDate(today);render();}));
  ctrl.appendChild(BTN('+1 Wo ▶','#6366f1',true,function(){ST.ganttStart=fmtDate(addD(parseD(ST.ganttStart),7));render();}));
  var gsel=document.createElement('select'); gsel.style.cssText='background:#1e293b;border:1px solid #334155;border-radius:6px;color:#f1f5f9;padding:5px 8px;font-size:12px;';
  [{v:14,l:'2 Wochen'},{v:28,l:'4 Wochen'},{v:56,l:'8 Wochen'}].forEach(function(o){var op=document.createElement('option');op.value=o.v;op.textContent=o.l;if(o.v===ST.ganttDays)op.selected=true;gsel.appendChild(op);});
  gsel.onchange=function(ev){ST.ganttDays=+ev.target.value;render();}; ctrl.appendChild(gsel); wrap.appendChild(ctrl);
  var scroll=D({overflowX:'auto'});
  var inner=D({minWidth:(LW+ST.ganttDays*CW)+'px'});
  var months=[],curM=null,mSt=0;
  dayArr.forEach(function(d,i){var m=d.getMonth();if(m!==curM){if(curM!==null)months.push({label:dayArr[mSt].toLocaleDateString('de-DE',{month:'long',year:'numeric'}),count:i-mSt});curM=m;mSt=i;}});
  months.push({label:dayArr[mSt].toLocaleDateString('de-DE',{month:'long',year:'numeric'}),count:dayArr.length-mSt});
  var mRow=D({display:'flex',borderBottom:'1px solid #1e293b'}); mRow.appendChild(D({width:LW+'px',flexShrink:'0'}));
  months.forEach(function(m,i){mRow.appendChild(D({width:(m.count*CW)+'px',flexShrink:'0',fontSize:'11px',color:'#a8b8cc',padding:'4px 6px',borderLeft:i>0?'1px solid #334155':'none',overflow:'hidden',whiteSpace:'nowrap'},m.label));});

    [['dashboard','📊 Dashboard'],['auftraege','📋 Aufträge'],['gantt','📅 Gantt'],['mitarbeiter','👷 Mitarbeiter'],['kapazitaet','🗂 Kapazität']].forEach(function(tk){
      var t=document.createElement('button'); t.className='tab'+(ST.tab===tk[0]?' active':'');
      t.textContent=tk[1]; t.onclick=(function(k){return function(){ST.tab=k;render();};})(tk[0]); tabBar.appendChild(t);
    });
    app.appendChild(tabBar);
    var content=D({padding:'24px',maxWidth:'1400px',margin:'0 auto'});
    if(ST.tab==='dashboard') content.appendChild(tabDashboard(mm));
    else if(ST.tab==='auftraege') content.appendChild(tabAuftraege(mm));
    else if(ST.tab==='gantt') content.appendChild(tabGantt(mm));
    else if(ST.tab==='mitarbeiter') content.appendChild(tabMitarbeiter(mm));
    else if(ST.tab==='kapazitaet') content.appendChild(tabKapazitaet(mm));
    app.appendChild(content);
    buildModals(app,mm);
  } catch(err){
    var app2=document.getElementById('root');
    if(app2) app2.innerHTML='<div style="color:#ef4444;padding:40px;background:#1e293b;margin:20px;border-radius:12px;font-size:13px"><b>Fehler:</b> '+err.message+'<br><br><pre style="font-size:11px;overflow:auto;white-space:pre-wrap">'+err.stack+'</pre></div>';
  }
}

render();
})();
</script>
</body>
</html>
